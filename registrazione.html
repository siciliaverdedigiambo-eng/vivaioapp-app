<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>VivaioApp — Inizia gratis</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#3B6D11;--green-dark:#2a5009;--green-light:#7DC55E;--green-pale:#EAF3DE}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#1e3d08,#3B6D11);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
/* logo-wrap replaced */


h2{font-size:20px;font-weight:700;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:14px;color:#888;margin-bottom:1.75rem}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:1.75rem}
.step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step.active{background:var(--green);color:white}
.step.done{background:var(--green-pale);color:var(--green)}
.step.todo{background:#f0f0f0;color:#bbb}
.step-line{flex:1;height:2px;background:#f0f0f0;border-radius:2px}
.step-line.done{background:var(--green-pale)}
label{font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:5px}
input,select{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:9px;font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .2s;margin-bottom:1rem}
input:focus,select:focus{border-color:var(--green)}
input.err-field{border-color:#e74c3c}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-green{width:100%;background:var(--green);color:white;border:none;padding:13px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-green:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-green:disabled{background:#ccc;cursor:not-allowed;transform:none}
.btn-back{width:100%;background:transparent;color:#888;border:1.5px solid #ddd;padding:11px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-back:hover{border-color:#999;color:#555}
.err{color:#c0392b;font-size:13px;margin-bottom:12px;background:#fff5f5;padding:10px 12px;border-radius:8px;border:1px solid #fcc}
.success-wrap{text-align:center;padding:1rem 0}
.success-icon{font-size:56px;margin-bottom:1rem}
.success-wrap h2{font-size:22px;margin-bottom:8px}
.success-wrap p{color:#666;font-size:14px;line-height:1.6;margin-bottom:1rem}
.link-box{background:var(--green-pale);border:1px solid #c5e0a0;border-radius:10px;padding:14px;text-align:center;margin:1rem 0}
.link-box a{color:var(--green);font-weight:700;font-size:15px;text-decoration:none;word-break:break-all}
.link-box a:hover{text-decoration:underline}
.credentials-box{background:#f8faf7;border-radius:10px;padding:16px;margin:1rem 0;text-align:left}
.credentials-box p{font-size:13px;color:#555;margin-bottom:6px}
.credentials-box strong{color:var(--green);font-family:monospace;font-size:14px}
.promo-applied{background:#E8F5E9;border:1px solid #a5d6a7;border-radius:8px;padding:10px 14px;font-size:13px;color:#2E7D32;margin-bottom:1rem;display:none}
.promo-applied.show{display:flex;align-items:center;gap:8px}
.hint{font-size:12px;color:#aaa;margin-top:-8px;margin-bottom:1rem}
.piano-card{border:2px solid #eee;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.piano-card:hover,.piano-card.selected{border-color:var(--green);background:var(--green-pale)}
.piano-card .piano-name{font-weight:700;font-size:15px;color:#1a1a1a}
.piano-card .piano-price{font-size:22px;font-weight:800;color:var(--green);margin:4px 0}
.piano-card .piano-desc{font-size:12px;color:#888}
.piano-card input[type=radio]{display:none}
.footer-note{text-align:center;font-size:12px;color:#bbb;margin-top:1rem}
.footer-note a{color:var(--green);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:2rem">
    <img src="vivaioapp-logo.svg" alt="VivaioApp" style="width:180px;height:180px;object-fit:contain;display:inline-block">
  </div>
  <div id="app"></div>
</div>

<script>
const SB  = 'https://ikxhdmxjvodcyypnmsuh.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlreGhkbXhqdm9kY3l5cG5tc3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODk3MTYsImV4cCI6MjA5NTM2NTcxNn0.KEtZDskCrvmE4K2EOzqYXRq12bvligwhRLnoeeR6X5Q';
const SBH = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

let step = 1;
let formData = {
  nome:'', email:'', piano:'pro',
  username:'', password:'', codice:''
};
let promoAttiva = null;
let prezzoFinale = null;

async function sbIns(t,d){
  const r = await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:SBH,body:JSON.stringify(d)});
  return r.json();
}
async function sbFind(t,field,val){
  const r = await fetch(SB+'/rest/v1/'+t+'?'+field+'=eq.'+encodeURIComponent(val),{headers:SBH});
  const list = await r.json();
  return Array.isArray(list)?list:[];
}
async function sbUpd(t,id,d){
  await fetch(SB+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id),{method:'PATCH',headers:SBH,body:JSON.stringify(d)});
}

function render(){
  const app = document.getElementById('app');
  if(step===1) app.innerHTML = renderStep1();
  else if(step===2) app.innerHTML = renderStep2();
  else if(step===3) app.innerHTML = renderStep3();
  else if(step==='done') app.innerHTML = renderDone();
}

function stepIndicator(current){
  const steps = [1,2,3];
  return '<div class="step-indicator">' +
    steps.map((s,i) => {
      const cls = s < current ? 'done' : s===current ? 'active' : 'todo';
      const label = s < current ? '✓' : s;
      return (i>0?'<div class="step-line '+(s<=current?'done':'')+'"></div>':'')+
             '<div class="step '+cls+'">'+label+'</div>';
    }).join('') +
  '</div>';
}

// ── STEP 1: Vivaio + Email + Piano ──
function renderStep1(){
  const prezzi = {starter:39,pro:79,enterprise:149};
  const sconto = promoAttiva;
  const calcPrezzo = (base) => {
    if(!sconto) return base;
    if(sconto.piano!=='tutti'&&sconto.piano!==formData.piano) return base;
    return sconto.tipo==='percentuale'
      ? Math.round(base*(1-sconto.valore/100))
      : Math.max(0,base-sconto.valore);
  };

  return stepIndicator(1) + `
    <h2>Il tuo vivaio</h2>
    <p class="subtitle">Raccontaci di te — ci vogliono 2 minuti</p>
    <div id="promo-applied" class="promo-applied ${sconto?'show':''}">
      🏷️ Codice <strong>${sconto?sconto.codice:''}</strong> applicato — ${sconto?(sconto.tipo==='percentuale'?sconto.valore+'% di sconto':'€'+sconto.valore+' di sconto'):''}
    </div>
    <div id="err1" style="display:none" class="err"></div>
    <label>Nome del vivaio *</label>
    <input id="f-nome" value="${formData.nome}" placeholder="es. Vivaio Rossi" oninput="formData.nome=this.value">
    <label>Email aziendale *</label>
    <input id="f-email" type="email" value="${formData.email}" placeholder="info@miovivaio.it" oninput="formData.email=this.value">
    <label>Scegli il piano</label>
    ${['starter','pro','enterprise'].map(p => `
      <div class="piano-card ${formData.piano===p?'selected':''}" onclick="selectPiano('${p}')">
        <input type="radio" name="piano" value="${p}" ${formData.piano===p?'checked':''}>
        <div class="piano-name">${p==='starter'?'🌱 Starter':p==='pro'?'🌿 Pro':'🏢 Enterprise'}</div>
        <div class="piano-price">
          ${sconto&&(sconto.piano==='tutti'||sconto.piano===p)?
            '<span style="text-decoration:line-through;opacity:.4;font-size:16px">€'+prezzi[p]+'</span> €'+calcPrezzo(prezzi[p]):
            '€'+prezzi[p]}
          <span style="font-size:14px;font-weight:400">/mese</span>
        </div>
        <div class="piano-desc">${p==='starter'?'Fino a 3 centri, 15 dipendenti':p==='pro'?'Centri e dipendenti illimitati':'Tutto Pro + supporto dedicato'}</div>
      </div>
    `).join('')}
    <label>Hai un codice sconto?</label>
    <div style="display:flex;gap:8px">
      <input id="f-codice" value="${formData.codice}" placeholder="es. BLACKFRIDAY" style="margin-bottom:0;text-transform:uppercase" oninput="formData.codice=this.value.toUpperCase()">
      <button onclick="applicaCodice()" style="padding:0 18px;border:1.5px solid var(--green);border-radius:9px;background:white;color:var(--green);font-family:Outfit,sans-serif;font-weight:600;cursor:pointer;white-space:nowrap;font-size:13px">Applica</button>
    </div>
    <p class="hint" style="margin-top:8px;margin-bottom:1rem" id="codice-hint"></p>
    <button class="btn-green" onclick="goStep2()">Continua →</button>
    <p class="footer-note" style="margin-top:1rem">Già registrato? <a href="https://app.vivaioapp.it">Accedi</a></p>
  `;
}

function selectPiano(p){
  formData.piano = p;
  render();
}

async function applicaCodice(){
  const cod = formData.codice.trim().toUpperCase();
  const hint = document.getElementById('codice-hint');
  if(!cod)return;
  const list = await sbFind('codici_sconto','codice',cod);
  const now = new Date().toISOString().slice(0,10);
  const valido = list.find(c=>
    c.attivo &&
    (!c.data_inizio||c.data_inizio<=now) &&
    (!c.data_fine||c.data_fine>=now) &&
    (!c.uso_max||c.uso_count<c.uso_max) &&
    (c.piano==='tutti'||c.piano===formData.piano)
  );
  if(valido){
    promoAttiva = valido;
    hint.style.color='#2E7D32';
    hint.textContent='✓ Codice valido!';
    render();
  } else {
    promoAttiva = null;
    hint.style.color='#c0392b';
    hint.textContent='Codice non valido o scaduto.';
  }
}

async function goStep2(){
  const nome = formData.nome.trim();
  const email = formData.email.trim().toLowerCase();
  const err = document.getElementById('err1');
  if(!nome||!email){ err.textContent='Inserisci nome vivaio ed email.'; err.style.display='block'; return; }
  if(!/\S+@\S+\.\S+/.test(email)){ err.textContent='Email non valida.'; err.style.display='block'; return; }
  err.style.display='none';
  // Check email not already registered
  const existing = await sbFind('tenants','email',email);
  if(existing.length){ err.textContent='Questa email è già registrata. Vuoi accedere?'; err.style.display='block'; return; }
  formData.email = email;
  step = 2;
  render();
}

// ── STEP 2: Credenziali ──
function renderStep2(){
  return stepIndicator(2) + `
    <h2>Le tue credenziali</h2>
    <p class="subtitle">Scegli username e password per accedere</p>
    <div id="err2" style="display:none" class="err"></div>
    <label>Username *</label>
    <input id="f-user" value="${formData.username}" placeholder="es. mario.rossi" oninput="formData.username=this.value.toLowerCase().replace(/\s/g,'')">
    <p class="hint">Solo lettere, numeri e punti. Niente spazi.</p>
    <label>Password *</label>
    <input id="f-pass" type="password" value="${formData.password}" placeholder="Minimo 6 caratteri" oninput="formData.password=this.value">
    <label>Conferma password *</label>
    <input id="f-pass2" type="password" placeholder="Ripeti la password">
    <button class="btn-green" onclick="goStep3()">Continua →</button>
    <button class="btn-back" onclick="step=1;render()">← Indietro</button>
  `;
}

function goStep3(){
  const u = formData.username.trim();
  const p = formData.password;
  const p2 = document.getElementById('f-pass2').value;
  const err = document.getElementById('err2');
  if(!u||!p){ err.textContent='Inserisci username e password.'; err.style.display='block'; return; }
  if(u.length<3){ err.textContent='Username troppo corto (minimo 3 caratteri).'; err.style.display='block'; return; }
  if(p.length<6){ err.textContent='Password troppo corta (minimo 6 caratteri).'; err.style.display='block'; return; }
  if(p!==p2){ err.textContent='Le password non coincidono.'; err.style.display='block'; return; }
  step = 3;
  render();
}

// ── STEP 3: Riepilogo + Conferma ──
function renderStep3(){
  const prezzi = {starter:39,pro:79,enterprise:149};
  const base = prezzi[formData.piano];
  const sconto = promoAttiva;
  const finale = sconto
    ? (sconto.tipo==='percentuale'?Math.round(base*(1-sconto.valore/100)):Math.max(0,base-sconto.valore))
    : base;

  return stepIndicator(3) + `
    <h2>Riepilogo</h2>
    <p class="subtitle">Controlla i dati prima di completare</p>
    <div id="err3" style="display:none" class="err"></div>
    <div style="background:#f8faf7;border-radius:12px;padding:16px;margin-bottom:1.5rem">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;justify-content:space-between;font-size:14px">
          <span style="color:#888">Vivaio</span>
          <strong>${formData.nome}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px">
          <span style="color:#888">Email</span>
          <strong>${formData.email}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px">
          <span style="color:#888">Username</span>
          <strong>${formData.username}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px">
          <span style="color:#888">Piano</span>
          <strong style="color:var(--green);text-transform:capitalize">${formData.piano}</strong>
        </div>
        <div style="border-top:1px solid #eee;padding-top:10px;display:flex;justify-content:space-between;font-size:15px">
          <span style="color:#888">Prezzo mensile</span>
          <strong>
            ${sconto&&finale!==base?'<span style="text-decoration:line-through;opacity:.4;font-size:13px">€'+base+'</span> ':''}<span style="color:var(--green)">€${finale}</span>
          </strong>
        </div>
        ${sconto?'<div style="font-size:12px;color:#2E7D32;text-align:right">🏷️ Codice '+sconto.codice+' applicato</div>':''}
      </div>
    </div>
    <p style="font-size:12px;color:#aaa;margin-bottom:1.5rem;text-align:center">
      14 giorni di prova gratuita · Nessuna carta richiesta · Cancella quando vuoi
    </p>
    <button class="btn-green" onclick="completa()">🚀 Crea il mio account</button>
    <button class="btn-back" onclick="step=2;render()">← Indietro</button>
  `;
}

async function completa(){
  const btn = document.querySelector('#app .btn-green');
  btn.textContent = 'Creazione account...';
  btn.disabled = true;
  const err = document.getElementById('err3');

  try{
    // Create tenant
    const tRes = await sbIns('tenants',{
      nome: formData.nome,
      email: formData.email,
      piano: formData.piano,
      attivo: true
    });
    const tenant = Array.isArray(tRes)?tRes[0]:tRes;
    if(!tenant?.id) throw new Error('Errore creazione account');

    // Create admin user
    const uRes = await sbIns('utenti',{
      id: 'adm-' + tenant.id.slice(0,8),
      tenantId: tenant.id,
      nome: formData.nome,
      username: formData.username,
      pass: formData.password,
      ruolo: 'admin',
      centroIds: []
    });

    // Update promo usage count
    if(promoAttiva){
      await sbUpd('codici_sconto', promoAttiva.id, {
        uso_count: (promoAttiva.uso_count||0) + 1
      });
    }

    step = 'done';
    render();

  } catch(e){
    err.textContent = 'Errore: ' + e.message + '. Riprova o contatta support@vivaioapp.it';
    err.style.display = 'block';
    btn.textContent = '🚀 Crea il mio account';
    btn.disabled = false;
  }
}

// ── DONE ──
function renderDone(){
  return `
    <div class="success-wrap">
      <div class="success-icon">🎉</div>
      <h2>Account creato!</h2>
      <p>Benvenuto su VivaioApp, <strong>${formData.nome}</strong>!<br>
      Il tuo gestionale è pronto. Hai 14 giorni di prova gratuita.</p>
      <div class="link-box">
        <p style="font-size:12px;color:#888;margin-bottom:6px">Accedi al tuo gestionale</p>
        <a href="https://app.vivaioapp.it" target="_blank">🌿 app.vivaioapp.it</a>
      </div>
      <div class="credentials-box">
        <p>📧 Email: <strong>${formData.email}</strong></p>
        <p>👤 Username: <strong>${formData.username}</strong></p>
        <p style="margin-bottom:0">🔑 Password: la password che hai scelto</p>
      </div>
      <p style="font-size:12px;color:#aaa;margin-top:1rem">
        Salva queste credenziali in un posto sicuro.<br>
        Per assistenza: <a href="mailto:support@vivaioapp.it" style="color:var(--green)">support@vivaioapp.it</a>
      </p>
      <a href="https://app.vivaioapp.it" style="display:block;margin-top:1.5rem">
        <button class="btn-green" style="font-size:16px">Accedi ora →</button>
      </a>
    </div>
  `;
}

// Init
render();
</script>
</body>
</html>
