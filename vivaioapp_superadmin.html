<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VivaioApp — Super Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f0;color:#1a1a1a;min-height:100vh}
:root{--green:#3B6D11;--green-dark:#2a5009;--green-pale:#EAF3DE}
.topbar{background:var(--green);color:white;padding:14px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.topbar img{height:38px}
.topbar h1{font-size:18px;font-weight:700;flex:1}
.nav-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.1);border-radius:8px;padding:4px}
.nav-tab{padding:6px 16px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nav-tab.active{background:white;color:var(--green);font-weight:700}
.btn-logout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:7px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;margin-left:8px}
.btn-logout:hover{background:rgba(255,255,255,0.25)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-card{background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.login-card img{display:block;margin:0 auto 1.5rem;height:52px}
.login-card h2{font-size:17px;font-weight:700;margin-bottom:4px;text-align:center}
.login-card p{font-size:13px;color:#888;text-align:center;margin-bottom:1.5rem}
label{font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:5px;margin-top:2px}
input,select{width:100%;padding:10px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .2s;margin-bottom:1rem;background:white}
input:focus,select:focus{border-color:var(--green)}
.btn-green{width:100%;background:var(--green);color:white;border:none;padding:12px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-green:hover{background:var(--green-dark)}
.err{color:#c0392b;font-size:13px;margin-bottom:12px;text-align:center}
.main{max-width:1100px;margin:0 auto;padding:28px 20px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:white;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.stat-card .num{font-size:32px;font-weight:800;color:var(--green)}
.stat-card .lbl{font-size:13px;color:#888;margin-top:2px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:16px 20px}
.section-header h2{font-size:17px;font-weight:700}
.btn-add{background:var(--green);color:white;border:none;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-add:hover{background:var(--green-dark)}
.card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#f8faf7;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;padding:11px 16px;text-align:left;border-bottom:1px solid #eee}
td{padding:13px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafff8}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.starter{background:#E3F2FD;color:#1565C0}
.badge.pro{background:#E8F5E9;color:#2E7D32}
.badge.enterprise{background:#FFF3E0;color:#E65100}
.badge.active{background:#E8F5E9;color:#2E7D32}
.badge.inactive{background:#FFEBEE;color:#C62828}
.badge.perc{background:#F3E5F5;color:#6A1B9A}
.badge.fisso{background:#E3F2FD;color:#1565C0}
.badge.scaduto{background:#ECEFF1;color:#546E7A}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-edit{background:#EAF3DE;color:var(--green)}
.btn-edit:hover{background:#d4ecba}
.btn-toggle{background:#FFF3E0;color:#E65100}
.btn-toggle:hover{background:#ffe0b2}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:white;border-radius:16px;padding:2rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:1.5rem}
.modal-footer{display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end}
.btn-cancel{background:#f0f0f0;color:#555;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-save{background:var(--green);color:white;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.success{background:#E8F5E9;color:#2E7D32;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:1rem;text-align:center}
.coupon-chip{display:inline-block;background:#1a1a1a;color:#fff;font-family:monospace;font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px;letter-spacing:1px}
.empty{text-align:center;color:#aaa;padding:2.5rem;font-size:14px}
@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .nav-tabs{display:none}
}
</style>
</head>

let authed  = sessionStorage.getItem('sa_auth') === '1';
let tenants = [];
let utenti  = [];
let codici  = [];
let currentTab = 'clienti';

// ── DB ──
async function sbGet(t, extra=''){
  const r = await fetch(SB+'/rest/v1/'+t+'?order=createdAt.desc'+extra, {headers:SBH});
  return r.json();
}
async function sbIns(t,d){
  const r = await fetch(SB+'/rest/v1/'+t, {method:'POST',headers:SBH,body:JSON.stringify(d)});
  return r.json();
}
async function sbUpd(t,id,d){
  await fetch(SB+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id), {method:'PATCH',headers:SBH,body:JSON.stringify(d)});
}
async function sbDel(t,id){
  await fetch(SB+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id), {method:'DELETE',headers:SBH});
}
function gid(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

async function loadData(){
  render(); // show loading state first
  [tenants, utenti, codici] = await Promise.all([
    sbGet('tenants'), sbGet('utenti'), sbGet('codici_sconto')
  ]);
  render(); // re-render with data
}

// ── AUTH ──
function doLogin(){
  const p = document.getElementById('sa-pass').value;
  if(p === SA_PASS){
    sessionStorage.setItem('sa_auth','1');
    authed = true;
    loadData();
  } else {
    const el = document.getElementById('sa-err');
    el.textContent = 'Password non valida.';
    el.style.display = 'block';
  }
}
function doLogout(){
  sessionStorage.removeItem('sa_auth');
  authed = false;
  render();
}

// ── RENDER ──
function render(){
  if(!authed){ renderLogin(); return; }
  renderMain();
}

function renderLogin(){
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <img src="${LOGO}" alt="VivaioApp">
        <h2>Super Admin</h2>
        <p>Accesso riservato</p>
        <label>Password</label>
        <input type="password" id="sa-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div id="sa-err" class="err" style="display:none"></div>
        <button class="btn-green" onclick="doLogin()">Accedi</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('sa-pass')?.focus(), 100);
}

function renderMain(){
  const total  = tenants.length;
  const active = tenants.filter(t=>t.attivo).length;
  const trials = tenants.filter(t=>t.attivo&&new Date(t.trialEndsAt)>new Date()).length;
  const pro    = tenants.filter(t=>t.piano==='pro'||t.piano==='enterprise').length;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <img src="${LOGO}" alt="VivaioApp">
      <h1>Super Admin</h1>
      <div class="nav-tabs">
        <button class="nav-tab ${currentTab==='clienti'?'active':''}" onclick="switchTab('clienti')">👥 Clienti</button>
        <button class="nav-tab ${currentTab==='sconti'?'active':''}" onclick="switchTab('sconti')">🏷️ Sconti & Codici</button>
      </div>
      <button class="btn-logout" onclick="doLogout()">Esci</button>
    </div>
    <div class="main">
      <div class="stats-row">
        <div class="stat-card"><div class="num">${total}</div><div class="lbl">Clienti totali</div></div>
        <div class="stat-card"><div class="num">${active}</div><div class="lbl">Clienti attivi</div></div>
        <div class="stat-card"><div class="num">${trials}</div><div class="lbl">In trial</div></div>
        <div class="stat-card"><div class="num">${pro}</div><div class="lbl">Piani Pro/Enterprise</div></div>
      </div>
      <div id="tab-content"></div>
    </div>
    <div id="modal-root"></div>`;

  if(currentTab==='clienti') renderClienti();
  else renderSconti();
}

function switchTab(tab){
  currentTab = tab;
  renderMain();
}

// ── TAB CLIENTI ──
function renderClienti(){
  if(!tenants.length && authed){
    document.getElementById('tab-content').innerHTML = '<div style="text-align:center;padding:3rem;color:#aaa">Caricamento clienti...</div>';
    return;
  }
  const rows = tenants.map(t=>{
    const nU = utenti.filter(u=>u.tenantId===t.id).length;
    const trialEnd = new Date(t.trialEndsAt);
    const isTrial = trialEnd > new Date();
    const days = Math.ceil((trialEnd-new Date())/(1000*60*60*24));
    const pc = t.piano==='pro'?'pro':t.piano==='enterprise'?'enterprise':'starter';
    return `<tr>
      <td><strong>${t.nome}</strong><br><span style="font-size:12px;color:#888">${t.email}</span></td>
      <td><span class="badge ${pc}">${t.piano}</span></td>
      <td>
        <span class="badge ${t.attivo?'active':'inactive'}">${t.attivo?'Attivo':'Sospeso'}</span>
        ${isTrial&&t.attivo?`<br><span style="font-size:11px;color:#F57F17">Trial: ${days} gg</span>`:''}
      </td>
      <td>${nU}</td>
      <td style="font-size:12px;color:#888">${new Date(t.createdAt).toLocaleDateString('it')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick="openEdit('${t.id}')">✏️ Modifica</button>
        <button class="btn-sm btn-toggle" onclick="toggleTenant('${t.id}','${t.attivo}')">${t.attivo?'⏸ Sospendi':'▶ Attiva'}</button>
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    <div class="card">
      <div class="section-header">
        <h2>Clienti (Vivai)</h2>
        <button class="btn-add" onclick="openNew()">+ Nuovo cliente</button>
      </div>
      <table>
        <thead><tr><th>Vivaio</th><th>Piano</th><th>Stato</th><th>Utenti</th><th>Registrato</th><th>Azioni</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" class="empty">Nessun cliente ancora</td></tr>'}</tbody>
      </table>
    </div>`;
}

// ── TAB SCONTI ──
function renderSconti(){
  const now = new Date();
  const rows = codici.map(c=>{
    const isExp = c.data_fine && new Date(c.data_fine) < now;
    const isActive = c.attivo && !isExp;
    const usageStr = c.uso_max ? `${c.uso_count||0}/${c.uso_max}` : `${c.uso_count||0} usi`;
    const periodo = c.data_inizio||c.data_fine
      ? `${c.data_inizio?new Date(c.data_inizio).toLocaleDateString('it'):''} → ${c.data_fine?new Date(c.data_fine).toLocaleDateString('it'):'∞'}`
      : '—';
    return `<tr>
      <td><span class="coupon-chip">${c.codice}</span></td>
      <td>${c.descrizione||'—'}</td>
      <td><span class="badge ${c.tipo==='percentuale'?'perc':'fisso'}">${c.tipo==='percentuale'?c.valore+'%':'€'+c.valore}</span></td>
      <td><span style="font-size:12px">${c.piano==='tutti'?'Tutti i piani':c.piano}</span></td>
      <td style="font-size:12px">${periodo}</td>
      <td style="font-size:13px">${usageStr}</td>
      <td><span class="badge ${isActive?'active':isExp?'scaduto':'inactive'}">${isActive?'Attivo':isExp?'Scaduto':'Disattivo'}</span></td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick="openEditCodice('${c.id}')">✏️</button>
        <button class="btn-sm btn-toggle" onclick="toggleCodice('${c.id}','${c.attivo}')">${c.attivo?'⏸':'▶'}</button>
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('tab-content').innerHTML = `
    <div class="card">
      <div class="section-header">
        <h2>🏷️ Codici Sconto & Promozioni</h2>
        <button class="btn-add" onclick="openNewCodice()">+ Nuovo codice</button>
      </div>
      <table>
        <thead><tr><th>Codice</th><th>Descrizione</th><th>Sconto</th><th>Piano</th><th>Periodo</th><th>Utilizzi</th><th>Stato</th><th>Azioni</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="8" class="empty">Nessun codice ancora — crea il primo!</td></tr>'}</tbody>
      </table>
    </div>
    <div class="card" style="padding:20px">
      <h2 style="font-size:15px;font-weight:700;margin-bottom:16px">💡 Promozioni stagionali rapide</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-sm btn-edit" style="padding:8px 16px;font-size:13px" onclick="quickPromo('BLACK FRIDAY','Black Friday -30%','percentuale',30,'2024-11-25','2024-12-02')">🖤 Black Friday</button>
        <button class="btn-sm btn-edit" style="padding:8px 16px;font-size:13px" onclick="quickPromo('NATALE25','Offerta Natale -20%','percentuale',20,'2024-12-20','2025-01-06')">🎄 Natale</button>
        <button class="btn-sm btn-edit" style="padding:8px 16px;font-size:13px" onclick="quickPromo('ESTATE25','Offerta Estate -15%','percentuale',15,'2025-06-01','2025-08-31')">☀️ Estate</button>
        <button class="btn-sm btn-edit" style="padding:8px 16px;font-size:13px" onclick="quickPromo('BENVENUTO','Sconto benvenuto -€10','fisso',10,null,null)">👋 Benvenuto</button>
      </div>
    </div>`;
}

function quickPromo(codice, desc, tipo, valore, inizio, fine){
  openNewCodice(codice, desc, tipo, valore, inizio, fine);
}

// ── MODAL NUOVO CLIENTE ──
function openNew(){
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>➕ Nuovo cliente</h3>
        <div id="modal-success" class="success" style="display:none"></div>
        <div class="form-row">
          <div><label>Nome vivaio *</label><input id="f-nome" placeholder="Vivaio Rossi"></div>
          <div><label>Email *</label><input id="f-email" type="email" placeholder="info@vivaiorossi.it"></div>
        </div>
        <label>Piano</label>
        <select id="f-piano">
          <option value="starter">🌱 Starter — €39/mese</option>
          <option value="pro" selected>🌿 Pro — €79/mese</option>
          <option value="enterprise">🏢 Enterprise — €149/mese</option>
        </select>
        <div class="form-row">
          <div><label>Username admin *</label><input id="f-user" placeholder="admin"></div>
          <div><label>Password admin *</label><input id="f-pass" placeholder="password123"></div>
        </div>
        <div id="modal-err" class="err" style="display:none"></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Annulla</button>
          <button class="btn-save" onclick="createTenant()">Crea cliente</button>
        </div>
      </div>
    </div>`;
}

async function createTenant(){
  const nome  = document.getElementById('f-nome').value.trim();
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  const piano = document.getElementById('f-piano').value;
  const uname = document.getElementById('f-user').value.trim();
  const pass  = document.getElementById('f-pass').value.trim();
  const err   = document.getElementById('modal-err');
  if(!nome||!email||!uname||!pass){err.textContent='Compila tutti i campi.';err.style.display='block';return;}
  if(tenants.find(t=>t.email===email)){err.textContent='Email già registrata.';err.style.display='block';return;}
  err.style.display='none';
  const btn = document.querySelector('#modal-root .btn-save');
  btn.textContent='Creazione...';btn.disabled=true;
  try{
    const tRes = await sbIns('tenants',{nome,email,piano,attivo:true});
    const tenant = Array.isArray(tRes)?tRes[0]:tRes;
    if(!tenant?.id) throw new Error('Errore creazione tenant');
    await sbIns('utenti',{id:'adm-'+tenant.id.slice(0,8),tenantId:tenant.id,nome:'Admin',username:uname,pass,ruolo:'admin',centroIds:[]});
    document.getElementById('modal-success').innerHTML=`✅ <strong>${nome}</strong> creato!<br>Email: <strong>${email}</strong> · Username: <strong>${uname}</strong>`;
    document.getElementById('modal-success').style.display='block';
    btn.style.display='none';
    document.querySelector('#modal-root .btn-cancel').textContent='Chiudi';
    await loadData();
  }catch(e){err.textContent='Errore: '+e.message;err.style.display='block';btn.textContent='Crea cliente';btn.disabled=false;}
}

// ── MODAL MODIFICA CLIENTE ──
function openEdit(id){
  const t = tenants.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>✏️ Modifica — ${t.nome}</h3>
        <label>Nome vivaio</label>
        <input id="e-nome" value="${t.nome}">
        <label>Piano</label>
        <select id="e-piano">
          <option value="starter" ${t.piano==='starter'?'selected':''}>🌱 Starter</option>
          <option value="pro" ${t.piano==='pro'?'selected':''}>🌿 Pro</option>
          <option value="enterprise" ${t.piano==='enterprise'?'selected':''}>🏢 Enterprise</option>
        </select>
        <label>Trial fino al</label>
        <input id="e-trial" type="date" value="${t.trialEndsAt?.slice(0,10)||''}">
        <div id="modal-err" class="err" style="display:none"></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Annulla</button>
          <button class="btn-save" onclick="saveTenant('${id}')">Salva</button>
        </div>
      </div>
    </div>`;
}

async function saveTenant(id){
  const nome  = document.getElementById('e-nome').value.trim();
  const piano = document.getElementById('e-piano').value;
  const trial = document.getElementById('e-trial').value;
  await sbUpd('tenants',id,{nome,piano,...(trial?{trialEndsAt:new Date(trial).toISOString()}:{})});
  closeModal(); await loadData();
}

async function toggleTenant(id,attivo){
  const isActive = attivo==='true'||attivo===true;
  if(!confirm(isActive?'Sospendere questo cliente?':'Riattivare questo cliente?')) return;
  await sbUpd('tenants',id,{attivo:!isActive}); await loadData();
}

// ── MODAL NUOVO CODICE ──
function openNewCodice(cod='',desc='',tipo='percentuale',val='',inizio='',fine=''){
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>🏷️ Nuovo codice sconto</h3>
        <div id="modal-success" class="success" style="display:none"></div>
        <div class="form-row">
          <div>
            <label>Codice *</label>
            <div style="display:flex;gap:8px;margin-bottom:1rem">
              <input id="c-cod" placeholder="es. BLACKFRIDAY" value="${cod}" style="margin-bottom:0;text-transform:uppercase;font-family:monospace;font-weight:700">
              <button onclick="document.getElementById('c-cod').value=randomCode()" style="padding:0 12px;border:1.5px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:16px;flex-shrink:0">🎲</button>
            </div>
          </div>
          <div><label>Descrizione</label><input id="c-desc" placeholder="es. Black Friday 2025" value="${desc}"></div>
        </div>
        <div class="form-row">
          <div>
            <label>Tipo sconto</label>
            <select id="c-tipo" onchange="updateValLabel()">
              <option value="percentuale" ${tipo==='percentuale'?'selected':''}>% Percentuale</option>
              <option value="fisso" ${tipo==='fisso'?'selected':''}>€ Importo fisso</option>
            </select>
          </div>
          <div><label id="val-label">Valore (${tipo==='fisso'?'€':'%'}) *</label><input id="c-val" type="number" min="1" max="100" placeholder="${tipo==='fisso'?'10':'20'}" value="${val}"></div>
        </div>
        <div class="form-row">
          <div><label>Data inizio</label><input id="c-inizio" type="date" value="${inizio}"></div>
          <div><label>Data fine</label><input id="c-fine" type="date" value="${fine}"></div>
        </div>
        <div class="form-row">
          <div>
            <label>Piano applicabile</label>
            <select id="c-piano">
              <option value="tutti">Tutti i piani</option>
              <option value="starter">Solo Starter</option>
              <option value="pro">Solo Pro</option>
              <option value="enterprise">Solo Enterprise</option>
            </select>
          </div>
          <div><label>Usi massimi (vuoto = illimitato)</label><input id="c-max" type="number" min="1" placeholder="es. 50"></div>
        </div>
        <div id="modal-err" class="err" style="display:none"></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Annulla</button>
          <button class="btn-save" onclick="saveCodice()">Crea codice</button>
        </div>
      </div>
    </div>`;
}

function randomCode(){
  return Math.random().toString(36).slice(2,8).toUpperCase();
}

function updateValLabel(){
  const tipo = document.getElementById('c-tipo').value;
  document.getElementById('val-label').textContent = 'Valore ('+(tipo==='fisso'?'€':'%')+') *';
}

async function saveCodice(){
  const codice = document.getElementById('c-cod').value.trim().toUpperCase();
  const desc   = document.getElementById('c-desc').value.trim();
  const tipo   = document.getElementById('c-tipo').value;
  const valore = parseFloat(document.getElementById('c-val').value);
  const inizio = document.getElementById('c-inizio').value||null;
  const fine   = document.getElementById('c-fine').value||null;
  const piano  = document.getElementById('c-piano').value;
  const maxU   = document.getElementById('c-max').value ? parseInt(document.getElementById('c-max').value) : null;
  const err    = document.getElementById('modal-err');

  if(!codice||!valore){err.textContent='Inserisci codice e valore.';err.style.display='block';return;}
  if(codici.find(x=>x.codice===codice)){err.textContent='Codice già esistente.';err.style.display='block';return;}

  err.style.display='none';
  const btn = document.querySelector('#modal-root .btn-save');
  btn.textContent='Salvataggio...';btn.disabled=true;

  try{
    await sbIns('codici_sconto',{
      id:randomCode()+'-'+Date.now(),
      codice,descrizione:desc,tipo,valore,piano,
      data_inizio:inizio,data_fine:fine,
      uso_max:maxU,uso_count:0,attivo:true
    });
    document.getElementById('modal-success').innerHTML=`✅ Codice <strong>${codice}</strong> creato!`;
    document.getElementById('modal-success').style.display='block';
    btn.style.display='none';
    document.querySelector('#modal-root .btn-cancel').textContent='Chiudi';
    await loadData();
  }catch(e){err.textContent='Errore: '+e.message;err.style.display='block';btn.textContent='Crea codice';btn.disabled=false;}
}

function openEditCodice(id){
  const c = codici.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>✏️ Modifica codice — <span style="font-family:monospace">${c.codice}</span></h3>
        <label>Descrizione</label>
        <input id="ec-desc" value="${c.descrizione||''}">
        <div class="form-row">
          <div><label>Tipo</label>
            <select id="ec-tipo">
              <option value="percentuale" ${c.tipo==='percentuale'?'selected':''}>% Percentuale</option>
              <option value="fisso" ${c.tipo==='fisso'?'selected':''}>€ Fisso</option>
            </select>
          </div>
          <div><label>Valore</label><input id="ec-val" type="number" value="${c.valore}"></div>
        </div>
        <div class="form-row">
          <div><label>Data inizio</label><input id="ec-inizio" type="date" value="${c.data_inizio||''}"></div>
          <div><label>Data fine</label><input id="ec-fine" type="date" value="${c.data_fine||''}"></div>
        </div>
        <div class="form-row">
          <div><label>Piano</label>
            <select id="ec-piano">
              <option value="tutti" ${c.piano==='tutti'?'selected':''}>Tutti</option>
              <option value="starter" ${c.piano==='starter'?'selected':''}>Starter</option>
              <option value="pro" ${c.piano==='pro'?'selected':''}>Pro</option>
              <option value="enterprise" ${c.piano==='enterprise'?'selected':''}>Enterprise</option>
            </select>
          </div>
          <div><label>Usi max</label><input id="ec-max" type="number" value="${c.uso_max||''}"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Annulla</button>
          <button class="btn-save" onclick="updateCodice('${id}')">Salva</button>
        </div>
      </div>
    </div>`;
}

async function updateCodice(id){
  await sbUpd('codici_sconto',id,{
    descrizione:document.getElementById('ec-desc').value.trim(),
    tipo:document.getElementById('ec-tipo').value,
    valore:parseFloat(document.getElementById('ec-val').value),
    data_inizio:document.getElementById('ec-inizio').value||null,
    data_fine:document.getElementById('ec-fine').value||null,
    piano:document.getElementById('ec-piano').value,
    uso_max:document.getElementById('ec-max').value?parseInt(document.getElementById('ec-max').value):null
  });
  closeModal(); await loadData();
}

async function toggleCodice(id,attivo){
  const isActive = attivo==='true'||attivo===true;
  await sbUpd('codici_sconto',id,{attivo:!isActive}); await loadData();
}

function closeModal(){
  document.getElementById('modal-root').innerHTML='';
}

// ── INIT ──
render();
if(authed) loadData();
</script>
</body>
