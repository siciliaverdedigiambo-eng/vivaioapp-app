<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>VivaioApp — Gestionale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;color:#1a1a1a;background:#f3f4f2}
input,select,textarea{font-family:inherit;font-size:16px;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:#3B6D11;box-shadow:0 0 0 2px rgba(59,109,17,.1)}
input[type=checkbox]{width:18px;height:18px;accent-color:#3B6D11;flex-shrink:0}
textarea{resize:vertical}
button{cursor:pointer;font-family:inherit}
.btn-g{background:#3B6D11;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:500}
.btn-g:disabled{opacity:.5;cursor:default}
.btn-n{background:#fff;color:#1a1a1a;border:1px solid #ccc;border-radius:8px;padding:10px 16px;font-size:15px}
.btn-r{background:#fff;color:#A32D2D;border:1px solid #F7C1C1;border-radius:8px;padding:7px 12px;font-size:13px}
.sm{padding:6px 10px!important;font-size:13px!important}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem}
/* Tables: horizontal scroll on mobile */
.tbl-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:500px}
.tbl th{padding:9px 12px;text-align:left;font-weight:500;font-size:13px;background:#f5f5f3;color:#666;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #eee;font-size:14px}
.lbl{font-size:14px;color:#666;display:block;margin-bottom:5px}
/* Modal: full screen on mobile */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-height:92vh;overflow-y:auto}
/* Tab bar */
.tab-bar{display:flex;border-bottom:1px solid #e5e5e5;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 14px;font-size:14px;color:#666;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab.active{border-bottom-color:#3B6D11;color:#3B6D11;font-weight:500}
.stat{background:#f5f5f3;border-radius:10px;padding:12px}
.stat p:first-child{font-size:12px;color:#666;margin-bottom:4px}
.stat p:last-child{font-size:22px;font-weight:600}
.badge{font-size:12px;border-radius:4px;padding:2px 8px;white-space:nowrap}
.bg{background:#C0DD97;color:#27500A}.ba{background:#FAC775;color:#633806}.bb{background:#B5D4F4;color:#0C447C}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bar-bg{background:#eee;border-radius:4px;height:6px}
.bar-fill{background:#3B6D11;border-radius:4px;height:6px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 1rem;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10}
.success-box{background:#EAF3DE;border:1px solid #C0DD97;border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;color:#27500A;font-size:14px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#3B6D11;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{body{background:#fff}.no-print{display:none!important}.print-only{display:block!important}}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e5;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;cursor:pointer;gap:3px;-webkit-tap-highlight-color:transparent;position:relative}
.bnav-icon{font-size:22px;line-height:1}
.bnav-lbl{font-size:10px;color:#999;line-height:1}
.bnav-btn.active .bnav-lbl{color:#3B6D11;font-weight:600}
.bnav-btn.active .bnav-icon{filter:none}
.bnav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:#E24B4A;color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.content-with-nav{padding-bottom:80px}
.fab{position:fixed;bottom:72px;right:16px;width:52px;height:52px;border-radius:50%;background:#3B6D11;color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(59,109,17,.4);cursor:pointer;z-index:15;-webkit-tap-highlight-color:transparent}
.print-only{display:none}

/* ── MOBILE ── */
@media(max-width:640px){
  body{font-size:14px;background:#f3f4f2}
  input,select,textarea{font-size:16px}/* prevent iOS zoom */
  .card{border-radius:10px;padding:.875rem}
  .grid2,.grid3,.grid4{grid-template-columns:1fr!important;gap:10px}
  .modal{border-radius:16px 16px 0 0;padding:1.25rem 1rem;max-height:94vh}
  .overlay{align-items:flex-end}
  .topbar{padding:10px 1rem}
  .topbar .topbar-title{font-size:14px}
  .btn-g,.btn-n,.btn-r{padding:11px 16px;font-size:14px;border-radius:10px}
  .sm{padding:8px 10px!important;font-size:13px!important}
  .tbl th,.tbl td{padding:8px 10px;font-size:13px}
  .stat p:last-child{font-size:20px}
  .tab{padding:10px 12px;font-size:13px}
  /* Full-width buttons on mobile forms */
  .mob-full{width:100%!important}
  /* Padding for main content */
  .main-pad{padding:.875rem!important}
}
</style>

function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [username,setUsername]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState('email');

  const checkEmail=async()=>{
    if(!email.trim()){setErr('Inserisci la tua email aziendale.');return;}
    setLoading(true);setErr('');
    try{
      const r=await fetch(SB+'/rest/v1/tenants?email=eq.'+encodeURIComponent(email.trim().toLowerCase()),{headers:SBH});
      const tenants=await r.json();
      if(!tenants||tenants.length===0){setErr('Nessun account trovato. Contatta VivaioApp.');setLoading(false);return;}
      const t=tenants[0];
      if(!t.attivo){setErr('Account sospeso. Contatta VivaioApp.');setLoading(false);return;}
      sessionStorage.setItem('va_tenant',JSON.stringify(t));
      setStep('login');
    }catch{setErr('Errore di connessione. Riprova.');}
    setLoading(false);
  };

  const doLogin=async()=>{
    if(!username.trim()||!pass.trim()){setErr('Inserisci username e password.');return;}
    setLoading(true);setErr('');
    try{
      const tenant=JSON.parse(sessionStorage.getItem('va_tenant')||'{}');
      const r=await fetch(SB+'/rest/v1/utenti?tenantId=eq.'+tenant.id+'&username=eq.'+encodeURIComponent(username.trim()),{headers:SBH});
      const utenti=await r.json();
      if(!utenti||utenti.length===0||utenti[0].pass!==pass){setErr('Credenziali non valide.');setLoading(false);return;}
      const u={...utenti[0],tenant};
      try{sessionStorage.setItem('va_user',JSON.stringify(u));}catch{}
      onLogin(u);

    setLoading(false);

    tabs.map(t=>h('button',{key:t.id,className:'tab'+(active===t.id?' active':''),onClick:()=>onChange(t.id)},t.label))
  );
}

/* ── LOGIN ── */

function CentriTab({data,save}){
  const [selC,setSelC]=useState(null);const [modal,setModal]=useState(null);const [form,setForm]=useState({});const [saving,setSaving]=useState(false);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const close=()=>{setModal(null);setForm({});};
  const savCentro=async()=>{
    if(!form.nome?.trim())return;setSaving(true);
    const c=form.id?data.centri.map(x=>x.id===form.id?form:x):[...data.centri,{id:gid(),...form}];
    await save({...data,centri:c});setSaving(false);close();
  };
  const savSettore=async()=>{
    if(!form.nome?.trim())return;setSaving(true);
    const varieta=(form.varieta||[]).filter(v=>v.nome?.trim()).map(v=>({nome:v.nome,quantita:parseInt(v.quantita)||0,vaso:v.vaso||'',fornitore:v.fornitore||'',dataEntrata:v.dataEntrata||''}));
    const totPiante=varieta.reduce((s,v)=>s+(parseInt(v.quantita)||0),0);
    const sClean={...form,
      varieta,
      capacita:totPiante||parseInt(form.capacita)||0,
      lunghezza:form.lunghezza?parseFloat(form.lunghezza):null,
      larghezza:form.larghezza?parseFloat(form.larghezza):null,
      fornitore:form.fornitore||'',
      dataEntrata:form.dataEntrata||null,
      note:form.note||''
    };
    const s=form.id?data.settori.map(x=>x.id===form.id?sClean:x):[...data.settori,{id:gid(),centroId:selC,...sClean}];
    await save({...data,settori:s});setSaving(false);close();
  };
  const delC=async id=>{if(!confirm('Eliminare il centro e i suoi settori?'))return;await save({...data,centri:data.centri.filter(c=>c.id!==id),settori:data.settori.filter(s=>s.centroId!==id)});if(selC===id)setSelC(null);};
  const delS=async id=>{if(!confirm('Eliminare settore?'))return;await save({...data,settori:data.settori.filter(s=>s.id!==id)});};
  const cur=data.centri.find(c=>c.id===selC);
  const setts=data.settori.filter(s=>s.centroId===selC);
  return h('div',null,
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'1rem'}},
      h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
          h('h3',{style:{fontSize:'15px',fontWeight:500}},'Centri ('+data.centri.length+'/10)'),
          h('button',{onClick:()=>{setForm({});setModal('centro');},className:'btn-g sm',disabled:data.centri.length>=10},'+ Aggiungi')
        ),
        h('div',{className:'card',style:{padding:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}},
          data.centri.length===0?h('p',{style:{padding:'1rem',fontSize:'13px',color:'#666'}},'Nessun centro.'):
          h('table',{className:'tbl'},
            h('thead',null,h('tr',null,h('th',null,'Nome'),h('th',null,'Sett.'),h('th',{style:{width:'70px'}}))),
            h('tbody',null,data.centri.map(c=>h('tr',{key:c.id,onClick:()=>setSelC(c.id),style:{cursor:'pointer',background:selC===c.id?'#EAF3DE':''}},
              h('td',{style:{fontWeight:selC===c.id?500:400}},c.nome),
              h('td',{style:{color:'#666'}},data.settori.filter(s=>s.centroId===c.id).length),
              h('td',null,h('div',{style:{display:'flex',gap:'4px'}},
                h('button',{onClick:e=>{e.stopPropagation();setForm(c);setModal('centro');},className:'btn-n sm'},'✏️'),
                h('button',{onClick:e=>{e.stopPropagation();delC(c.id);},className:'btn-r sm'},'🗑')
              ))
            )))
          )
        )
      ),
      h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
          h('h3',{style:{fontSize:'15px',fontWeight:500}},cur?'Settori — '+cur.nome:'Settori'),
          selC&&h('button',{onClick:()=>{setForm({});setModal('settore');},className:'btn-g sm'},'+ Aggiungi')
        ),
        !selC?h('div',{className:'card'},h('p',{style:{fontSize:'13px',color:'#666'}},'Seleziona un centro.')):
        h('div',{className:'card',style:{padding:'8px'}},
          setts.length===0?h('p',{style:{padding:'8px',fontSize:'13px',color:'#666'}},'Nessun settore.'):
          h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
            setts.map(s=>h('div',{key:s.id,style:{background:'#f9f9f7',borderRadius:'10px',padding:'10px',border:'1px solid #e5e5e5'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}},
                h('div',null,
                  h('div',{style:{fontWeight:600,fontSize:'14px'}},s.nome),
                  s.capacita>0&&h('div',{style:{fontSize:'12px',color:'#3B6D11',marginTop:'2px'}},'🌱 '+s.capacita.toLocaleString('it-IT')+' piante')
                ),
                h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
                  s.lunghezza&&s.larghezza&&h('span',{style:{fontSize:'11px',color:'#888',background:'#f0f0f0',borderRadius:'4px',padding:'2px 6px'}},s.lunghezza+'×'+s.larghezza+' m'),
                  h('button',{onClick:()=>{setForm({...s,varieta:s.varieta||[]});setModal('settore');},className:'btn-n sm'},'✏️'),
                  h('button',{onClick:()=>delS(s.id),className:'btn-r sm'},'🗑')
                )
              ),
              s.varieta&&s.varieta.length>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'6px'}},
                s.varieta.filter(v=>v.nome).map((v,i)=>h('span',{key:i,style:{fontSize:'11px',background:'#EAF3DE',color:'#27500A',borderRadius:'4px',padding:'2px 8px',whiteSpace:'nowrap'}},

      modal==='centro'?h('div',null,
        h('label',{className:'lbl'},'Nome centro *'),
        h('input',{value:form.nome||'',onChange:F('nome'),style:{marginBottom:'1rem'}}),
        h('button',{onClick:savCentro,className:'btn-g',style:{width:'100%'},disabled:saving},saving?'Salvataggio...':'Salva')
      ):h('div',null,
        h('label',{className:'lbl'},'Nome settore *'),
        h('input',{value:form.nome||'',onChange:F('nome'),style:{marginBottom:'14px'}}),

        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'14px'}},

        ),

        h('label',{className:'lbl'},'Varietà di piante'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'8px'}},
          (form.varieta||[]).map((v,i)=>h('div',{key:i,style:{background:'#f9f9f7',borderRadius:'10px',padding:'10px',border:'1px solid #e5e5e5',position:'relative'}},
            h('button',{onClick:()=>setForm(f=>({...f,varieta:(f.varieta||[]).filter((_,j)=>j!==i)})),
              style:{position:'absolute',top:'8px',right:'8px',background:'transparent',border:'none',color:'#A32D2D',cursor:'pointer',fontSize:'18px',lineHeight:1,padding:0}},'×'),
            h('label',{className:'lbl'},'Varietà / tipologia'),
            h('input',{value:v.nome||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],nome:e.target.value};setForm(f=>({...f,varieta:vs}));},

            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}},
              h('div',null,h('label',{className:'lbl'},'Quantità'),h('input',{type:'number',value:v.quantita||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],quantita:parseInt(e.target.value)||0};setForm(f=>({...f,varieta:vs}));},placeholder:'0'})),

          )),

            onClick:()=>setForm(f=>({...f,varieta:[...(f.varieta||[]),{nome:'',quantita:0,vaso:'',fornitore:'',dataEntrata:''}]})),
            style:{background:'transparent',border:'1px dashed #3B6D11',borderRadius:'8px',color:'#3B6D11',cursor:'pointer',padding:'10px',fontSize:'14px',width:'100%'}
          },'+ Aggiungi varietà')

        h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'8px',alignItems:'center',marginBottom:'6px'}},

      )

      h('label',{className:'lbl'},'Username *'),
      h('input',{value:form.user||'',onChange:F('user'),style:{marginBottom:'10px'},autoComplete:'off'}),
      h('label',{className:'lbl'},'Password *'),

      h('label',{className:'lbl'},'Centri aziendali'),

/* ── DIPENDENTI SEARCH ── */
function DipList({data,checked,onToggle,oreMap,onOreChange,showOre,errBorder}){
  const [q,setQ]=useState('');
  const filtered=[...(data.dipendenti||[])].sort((a,b)=>(a.cognome||'').localeCompare(b.cognome||'')).filter(d=>{
    if(!q.trim())return true;
    const s=q.toLowerCase();
    return (d.cognome||'').toLowerCase().includes(s)||(d.nome||'').toLowerCase().includes(s);
  });
  const totOre=checked.reduce((s,id)=>s+(parseFloat((oreMap||{})[id])||0),0);
  return h('div',null,
    h('input',{placeholder:'Cerca dipendente...',value:q,onChange:e=>setQ(e.target.value),style:{marginBottom:'6px',fontSize:'13px'}}),
    h('div',{style:{border:'1px solid '+(errBorder?'#F7C1C1':'#ccc'),borderRadius:'8px',padding:'8px',maxHeight:'200px',overflowY:'auto'}},
      filtered.length===0?h('p',{style:{fontSize:'13px',color:'#999',padding:'4px'}},'Nessun risultato.'):
      filtered.map(d=>{
        const isChecked=checked.includes(d.id);
        return h('div',{key:d.id,style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 0'}},
          h('label',{style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'14px',flex:1,minWidth:0}},
            h('input',{type:'checkbox',checked:isChecked,onChange:()=>onToggle(d.id)}),
            h('span',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},d.cognome+' '+(d.nome||''))
          ),
          isChecked&&showOre&&h('div',{style:{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}},

/* ── REPORT ── */
function ReportTab({data,centroId}){
  const [f,setF]=useState({da:'',a:'',tipoId:'',dipId:'',settoreId:'',centroId:centroId||''});
  const [view,setView]=useState('tabella'); // tabella | riepilogo

  const centri=data.centri||[];
  const settoriDisp=f.centroId?(data.settori||[]).filter(s=>s.centroId===f.centroId):(data.settori||[]);

  const lav=(data.lavorazioni||[]).filter(l=>{
    if(l.stato!=='completata')return false;
    if(centroId&&l.centroId!==centroId)return false;
    if(f.centroId&&l.centroId!==f.centroId)return false;
    if(f.settoreId&&l.settoreId!==f.settoreId)return false;
    if(f.tipoId&&l.tipoId!==f.tipoId)return false;
    if(f.dipId&&!(l.dipendentiIds||[]).includes(f.dipId))return false;
    if(f.da&&String(l.data)<f.da)return false;
    if(f.a&&String(l.data)>f.a)return false;
    return true;
  }).sort((a,b)=>String(b.data).localeCompare(String(a.data)));

  const totOre=lav.reduce((s,l)=>s+(l.ore||0),0);
  const totDip=new Set(lav.flatMap(l=>l.dipendentiIds||[])).size;

  // Per riepilogo: raggruppa per tipo
  const perTipo=(data.tipi||[]).map(t=>{
    const tl=lav.filter(l=>l.tipoId===t.id);
    return{...t,n:tl.length,ore:tl.reduce((s,l)=>s+(l.ore||0),0)};
  }).filter(t=>t.n>0).sort((a,b)=>b.ore-a.ore);

  const perSettore=(data.settori||[]).filter(s=>centroId?s.centroId===centroId:true).map(s=>{
    const sl=lav.filter(l=>l.settoreId===s.id);
    return{...s,n:sl.length,ore:sl.reduce((x,l)=>x+(l.ore||0),0)};
  }).filter(s=>s.n>0).sort((a,b)=>b.ore-a.ore);

  const perDip=(data.dipendenti||[]).map(d=>{
    const dl=lav.filter(l=>(l.dipendentiIds||[]).includes(d.id));
    const oreD=dl.reduce((s,l)=>s+(parseFloat((l.oreMap||{})[d.id])||0),0);
    return{...d,n:dl.length,ore:oreD};
  }).filter(d=>d.n>0).sort((a,b)=>b.ore-a.ore);

  const getNome=(l)=>{
    const c2=(data.centri||[]).find(x=>x.id===l.centroId);
    const s=(data.settori||[]).find(x=>x.id===l.settoreId);
    const t=(data.tipi||[]).find(x=>x.id===l.tipoId);
    const nomi=(l.dipendentiIds||[]).map(id=>{const d=(data.dipendenti||[]).find(x=>x.id===id);return d?d.cognome+' '+(d.nome||''):'?';}).join(', ');
    return{centro:c2?.nome||'',settore:s?.nome||'',tipo:t?.nome||'',varieta:l.varietaId||'',nomi,ore:l.ore||0};
  };

  const exportXls=()=>{
    const wb=XLSX.utils.book_new();

    // Sheet 1: Dettaglio lavorazioni
    const hasDip=!!f.dipId;
    const dipName=hasDip?((data.dipendenti||[]).find(x=>x.id===f.dipId)||{}).cognome||'':'';
    const hdr1=['Data','Centro','Settore','Varietà','Tipo lavorazione','Dipendenti'];
    if(hasDip)hdr1.push('Ore '+dipName);
    hdr1.push('Ore totali','Quantità','Note');
    const rows1=[hdr1];
    lav.forEach(l=>{
      const{centro,settore,tipo,nomi,ore}=getNome(l);
      const row=[l.data||'',centro,settore,varieta,tipo,nomi];
      if(hasDip)row.push(parseFloat((l.oreMap||{})[f.dipId])||0);
      row.push(ore,l.quantita||'',l.note||'');
      rows1.push(row);
    });
    rows1.push([]);
    const totRow=['TOTALE','','','',''];
    if(hasDip)totRow.push(lav.reduce((s,l)=>s+(parseFloat((l.oreMap||{})[f.dipId])||0),0));
    totRow.push(totOre,'','');
    rows1.push(totRow);
    const ws1=XLSX.utils.aoa_to_sheet(rows1);
    ws1['!cols']=[{wch:12},{wch:18},{wch:12},{wch:22},{wch:35},{wch:10},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws1,'Dettaglio lavorazioni');

    // Sheet 2: Ore per dipendente
    const rows2=[['Cognome','Nome','N. lavorazioni','Ore totali']];
    perDip.forEach(d=>rows2.push([d.cognome,d.nome||'',d.n,d.ore]));
    const ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2['!cols']=[{wch:20},{wch:16},{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,'Ore per dipendente');

    // Sheet 3: Per tipo
    const rows3=[['Tipo lavorazione','N. lavorazioni','Ore totali']];
    perTipo.forEach(t=>rows3.push([t.nome,t.n,t.ore]));
    const ws3=XLSX.utils.aoa_to_sheet(rows3);
    ws3['!cols']=[{wch:24},{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws3,'Per tipo');

    // Sheet 4: Per settore
    const rows4=[['Centro','Settore','N. lavorazioni','Ore totali']];
    perSettore.forEach(s=>{
      const cn=(data.centri||[]).find(x=>x.id===s.centroId)?.nome||'';
      rows4.push([cn,s.nome,s.n,s.ore]);
    });
    const ws4=XLSX.utils.aoa_to_sheet(rows4);
    ws4['!cols']=[{wch:18},{wch:14},{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws4,'Per settore');

    const period=(f.da||f.a)?(f.da||'inizio')+'_'+(f.a||'oggi'):'tutti';
    XLSX.writeFile(wb,'report_sicilia_verde_'+period+'.xlsx');
  };

  return h('div',null,
    // Filtri
    h('div',{className:'card',style:{marginBottom:'1.25rem'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'10px',marginBottom:'10px'}},
        h('div',null,h('label',{className:'lbl'},'Dal'),h('input',{type:'date',value:f.da,onChange:e=>setF(p=>({...p,da:e.target.value}))})),
        h('div',null,h('label',{className:'lbl'},'Al'),h('input',{type:'date',value:f.a,onChange:e=>setF(p=>({...p,a:e.target.value}))})),
        !centroId&&h('div',null,h('label',{className:'lbl'},'Centro'),h('select',{value:f.centroId,onChange:e=>setF(p=>({...p,centroId:e.target.value,settoreId:''}))},h('option',{value:''},'Tutti'),centri.map(c2=>h('option',{key:c2.id,value:c2.id},c2.nome))))
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'10px',marginBottom:'10px'}},
        h('div',null,h('label',{className:'lbl'},'Settore'),h('select',{value:f.settoreId,onChange:e=>setF(p=>({...p,settoreId:e.target.value}))},h('option',{value:''},'Tutti'),settoriDisp.map(s=>h('option',{key:s.id,value:s.id},s.nome)))),
        h('div',null,h('label',{className:'lbl'},'Tipo lavorazione'),h('select',{value:f.tipoId,onChange:e=>setF(p=>({...p,tipoId:e.target.value}))},h('option',{value:''},'Tutti'),(data.tipi||[]).map(t=>h('option',{key:t.id,value:t.id},t.nome)))),
        h('div',null,h('label',{className:'lbl'},'Dipendente'),h('select',{value:f.dipId,onChange:e=>setF(p=>({...p,dipId:e.target.value}))},h('option',{value:''},'Tutti'),[...(data.dipendenti||[])].sort((a,b)=>(a.cognome||'').localeCompare(b.cognome||'')).map(d=>h('option',{key:d.id,value:d.id},d.cognome+' '+(d.nome||'')))))
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('button',{onClick:()=>setF({da:'',a:'',tipoId:'',dipId:'',settoreId:'',centroId:centroId||''}),className:'btn-n',style:{fontSize:'13px',padding:'5px 12px'}},'✕ Azzera filtri'),
        h('button',{onClick:exportXls,className:'btn-g',style:{display:'flex',alignItems:'center',gap:'6px'}},'⬇ Scarica Excel')
      )
    ),

    // Stat cards
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px',marginBottom:'1.25rem'}},
      h(Stat,{label:'Lavorazioni',value:lav.length}),
      h(Stat,{label:'Ore totali',value:totOre.toFixed(1)+'h'}),
      h(Stat,{label:'Dipendenti coinvolti',value:totDip}),
      h(Stat,{label:'Tipi lavorazione',value:perTipo.length})
    ),

    // View toggle
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem'}},
      ['tabella','riepilogo'].map(v=>h('button',{key:v,onClick:()=>setView(v),className:view===v?'btn-g':'btn-n',style:{fontSize:'13px',padding:'5px 14px'}},v==='tabella'?'Tabella dettaglio':'Riepilogo'))
    ),

    // TABELLA DETTAGLIO
    view==='tabella'&&h('div',{className:'card',style:{padding:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}},
      lav.length===0?h('p',{style:{padding:'1rem',fontSize:'13px',color:'#666'}},'Nessuna lavorazione trovata con i filtri selezionati.'):
      h('table',{className:'tbl'},
        h('thead',null,h('tr',null,
          h('th',null,'Data'),
          !centroId&&h('th',null,'Centro'),
          h('th',null,'Settore'),
          h('th',null,'Varietà'),
          h('th',null,'Tipo'),
          h('th',null,'Dipendenti'),
          f.dipId&&h('th',{style:{textAlign:'right',color:'#3B6D11'}},'Ore indiv.'),
          h('th',{style:{textAlign:'right'}},'Ore tot.'),
          h('th',null,'Quantità'),
          h('th',null,'Note')
        )),
        h('tbody',null,lav.map(l=>{
          const{centro,settore,tipo,nomi,ore}=getNome(l);
          return h('tr',{key:l.id},
            h('td',null,l.data||'—'),
            !centroId&&h('td',{style:{fontSize:'13px'}},centro),
            h('td',null,settore),
            h('td',{style:{fontSize:'12px',color:'#3B6D11'}},varieta||'—'),
            h('td',null,tipo),
            h('td',{style:{fontSize:'12px',color:'#666',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},nomi||'—'),
            f.dipId&&h('td',{style:{textAlign:'right',color:'#3B6D11',fontWeight:500}},
              (parseFloat((l.oreMap||{})[f.dipId])||0).toFixed(1)+'h'
            ),
            h('td',{style:{textAlign:'right',fontWeight:500}},ore.toFixed(1)+'h'),
            h('td',{style:{fontSize:'12px',color:'#666'}},l.quantita||'—'),
            h('td',{style:{fontSize:'12px',color:'#666',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},l.note||'—')
          );
        })),
        h('tfoot',null,h('tr',{style:{background:'#f5f5f3',fontWeight:500}},
          h('td',{colSpan:!centroId?5:4,style:{padding:'8px 12px',fontSize:'13px'}},'TOTALE'),
          f.dipId&&h('td',{style:{textAlign:'right',padding:'8px 12px',color:'#3B6D11'}},
            lav.reduce((s,l)=>s+(parseFloat((l.oreMap||{})[f.dipId])||0),0).toFixed(1)+'h'
          ),
          h('td',{style:{textAlign:'right',padding:'8px 12px'}},totOre.toFixed(1)+'h'),
          h('td',{colSpan:2})
        ))
      )
    ),

    // RIEPILOGO
    view==='riepilogo'&&h('div',{style:{display:'flex',flexDirection:'column',gap:'1.5rem'}},
      // Per dipendente
      h('div',{className:'card'},
        h('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'1rem'}},'Ore per dipendente'),
        perDip.length===0?h('p',{style:{fontSize:'13px',color:'#666'}},'Nessun dato.'):
        h('table',{className:'tbl'},
          h('thead',null,h('tr',null,h('th',null,'Cognome'),h('th',null,'Nome'),h('th',{style:{textAlign:'center'}},'Lavorazioni'),h('th',{style:{textAlign:'right'}},'Ore totali'))),
          h('tbody',null,perDip.map(d=>h('tr',{key:d.id},
            h('td',{style:{fontWeight:500}},d.cognome),
            h('td',null,d.nome||'—'),
            h('td',{style:{textAlign:'center',color:'#666'}},d.n),
            h('td',{style:{textAlign:'right',fontWeight:500}},d.ore.toFixed(1)+'h')
          ))),
          h('tfoot',null,h('tr',{style:{background:'#f5f5f3',fontWeight:500}},
            h('td',{colSpan:2,style:{padding:'8px 12px',fontSize:'13px'}},'TOTALE'),
            h('td',{style:{textAlign:'center',padding:'8px 12px'}},lav.length),
            h('td',{style:{textAlign:'right',padding:'8px 12px'}},totOre.toFixed(1)+'h')
          ))
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'1rem'}},
        // Per tipo
        h('div',{className:'card'},
          h('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'1rem'}},'Per tipo di lavorazione'),
          perTipo.length===0?h('p',{style:{fontSize:'13px',color:'#666'}},'Nessun dato.'):
          h('table',{className:'tbl'},
            h('thead',null,h('tr',null,h('th',null,'Tipo'),h('th',{style:{textAlign:'center'}},'N.'),h('th',{style:{textAlign:'right'}},'Ore'))),
            h('tbody',null,perTipo.map(t=>h('tr',{key:t.id},
              h('td',null,t.nome),h('td',{style:{textAlign:'center',color:'#666'}},t.n),h('td',{style:{textAlign:'right',fontWeight:500}},t.ore.toFixed(1)+'h')
            )))
          )
        ),
        // Per settore
        h('div',{className:'card'},
          h('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'1rem'}},'Per settore'),
          perSettore.length===0?h('p',{style:{fontSize:'13px',color:'#666'}},'Nessun dato.'):
          h('table',{className:'tbl'},
            h('thead',null,h('tr',null,!centroId&&h('th',null,'Centro'),h('th',null,'Settore'),h('th',{style:{textAlign:'center'}},'N.'),h('th',{style:{textAlign:'right'}},'Ore'))),
            h('tbody',null,perSettore.map(s=>{
              const cn=(data.centri||[]).find(x=>x.id===s.centroId)?.nome||'';
              return h('tr',{key:s.id},
                !centroId&&h('td',{style:{fontSize:'12px',color:'#666'}},cn),
                h('td',null,s.nome),h('td',{style:{textAlign:'center',color:'#666'}},s.n),h('td',{style:{textAlign:'right',fontWeight:500}},s.ore.toFixed(1)+'h')
              );
            }))
          )
        )
      )
    )
  );
}

/* ── ADMIN APP ── */
function AdminApp({data,save,user,logout,refresh}){
  const [tab,setTab]=useState('proposte');
  const [ok,setOk]=useState('');
  const [selCentroAdmin,setSelCentroAdmin]=useState('tutti');
  const centroId=selCentroAdmin==='tutti'?null:selCentroAdmin;

  const nProposte=(data.lavorazioni||[]).filter(l=>l.stato==='proposta').length;
  const nRichieste=(data.richieste||[]).filter(r=>r.stato==='pendente').length;
  const nUrgenti=(data.richieste||[]).filter(r=>r.stato==='pendente'&&r.urgente).length;

  const changeTab=t=>{setTab(t);setOk('');};

  // Bottom nav tabs (primary)
  const BNAV=[
    {id:'proposte',   icon:'📋', label:'Proposte',  badge:nProposte},
    {id:'richieste',  icon:'📬', label:'Richieste', badge:nRichieste, urgent:nUrgenti>0},
    {id:'confermate', icon:'✅', label:'Confermate', badge:0},
    {id:'altro',      icon:'⋯',  label:'Altro',     badge:0},
  ];

  // Centro filter (compact select)
  const centroFilter=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'1rem',background:'#fff',borderRadius:'10px',padding:'8px 12px',border:'1px solid #e5e5e5'}},
    h('span',{style:{fontSize:'13px',color:'#666',flexShrink:0}},'Centro:'),
    h('select',{value:selCentroAdmin,onChange:e=>setSelCentroAdmin(e.target.value),style:{border:'none',background:'transparent',fontSize:'14px',fontWeight:500,color:'#1a1a1a',flex:1,outline:'none'}},
      h('option',{value:'tutti'},'Tutti i centri'),
      (data.centri||[]).map(c=>h('option',{key:c.id,value:c.id},c.nome))
    )
  );

  return h('div',{style:{minHeight:'100vh',background:'#f3f4f2'}},
    h('div',{className:'topbar'},
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px',flex:1,minWidth:0}},
        h('img',{src:(data._logo||''),alt:'SV',style:{height:'28px',width:'auto',flexShrink:0}}),
        h('div',{style:{minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:'13px',lineHeight:1.2}},'Sicilia Verde'),
          h('div',{style:{fontSize:'11px',color:'#888'}},'Admin')
        )
      ),
      h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
        h('button',{onClick:async()=>{await refresh();setOk('✓ Aggiornato!');setTimeout(()=>setOk(''),2000);},style:{background:'transparent',border:'1px solid #e5e5e5',borderRadius:'8px',padding:'5px 10px',fontSize:'13px',cursor:'pointer'}},'🔄'),
        h('button',{onClick:logout,className:'btn-n',style:{padding:'5px 10px',fontSize:'13px'}},'Esci')
      )
    ),

    h('div',{className:'content-with-nav',style:{padding:'1rem'}},
      ok&&h('div',{className:'success-box',style:{marginBottom:'1rem'}},h('span',null,ok),h('button',{onClick:()=>setOk(''),className:'btn-n sm'},'×')),

      // TAB PROPOSTE
      tab==='proposte'&&h('div',null,
        centroFilter,
        h(ProposteTab,{key:'prop_'+selCentroAdmin,data,save,centroId})
      ),

      // TAB RICHIESTE
      tab==='richieste'&&h('div',null,
        nUrgenti>0&&h('div',{style:{background:'#E24B4A',color:'#fff',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'10px'}},
          h('span',{style:{fontSize:'20px'}},'🚨'),
          h('span',{style:{fontWeight:600,fontSize:'14px'}},nUrgenti+' richiesta'+(nUrgenti>1?'e':'')+' urgente'+(nUrgenti>1?'':'')+' in attesa!')
        ),
        centroFilter,
        h(RichiesteTab,{data,save,user,isAdmin:true,centroId})
      ),

      // TAB CONFERMATE
      tab==='confermate'&&h('div',null,
        centroFilter,
        h(ConfermatTab,{key:'conf_'+selCentroAdmin,data,save,centroId})
      ),

      // TAB ALTRO — menu a card
      tab==='altro'&&h('div',null,
        h('p',{style:{fontSize:'13px',color:'#888',marginBottom:'12px'}},'Gestione e strumenti'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
          [
            {id:'inserisci', icon:'➕', label:'Inserisci lavorazione', sub:'Assegna lavoro a un centro'},
            {id:'completate',icon:'📂', label:'Lavorazioni completate', sub:'Storico lavori finiti'},
            {id:'tutte',     icon:'🗂', label:'Tutte le lavorazioni',  sub:'Vista completa con filtri'},
            {id:'report',    icon:'📊', label:'Report e statistiche',  sub:'Analisi ore e lavorazioni'},
            {id:'centri',    icon:'🌿', label:'Centri & Settori',      sub:'Gestisci struttura azienda'},
            {id:'dip',       icon:'👷', label:'Dipendenti',            sub:'Anagrafica personale'},
            {id:'tipi',      icon:'🔧', label:'Tipi lavorazione',      sub:'Configura tipi'},
            {id:'utenti',    icon:'👤', label:'Utenti e responsabili', sub:'Gestisci accessi'},
          ].map(item=>h('button',{key:item.id,onClick:()=>changeTab(item.id),className:'card',
            style:{display:'flex',alignItems:'center',gap:'12px',border:'none',cursor:'pointer',textAlign:'left',WebkitTapHighlightColor:'transparent',width:'100%'}},
            h('span',{style:{fontSize:'26px',flexShrink:0}},item.icon),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{fontWeight:500,fontSize:'14px'}},item.label),
              h('div',{style:{fontSize:'12px',color:'#999',marginTop:'1px'}},item.sub)
            ),
            h('span',{style:{fontSize:'18px',color:'#ccc'}},'›')
          ))
        )
      ),

      // SUB-TABS (con back button)
      ['inserisci','completate','tutte','report','centri','dip','tipi','utenti'].includes(tab)&&h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'1rem'}},
          h('button',{onClick:()=>changeTab('altro'),style:{background:'transparent',border:'none',fontSize:'24px',cursor:'pointer',color:'#3B6D11',padding:'0 4px'}},'‹'),
          h('h3',{style:{fontSize:'15px',fontWeight:500}},{
            inserisci:'Inserisci lavorazione',completate:'Completate',tutte:'Tutte le lavorazioni',
            report:'Report',centri:'Centri & Settori',dip:'Dipendenti',tipi:'Tipi lavorazione',utenti:'Utenti'
          }[tab]||tab)
        ),
        ['completate','tutte'].includes(tab)&&centroFilter,
        tab==='inserisci'&&h(LavForm,{data,save,centroId:null,onDone:()=>setOk('✓ Lavorazione inserita!'),adminMode:true}),
        tab==='completate'&&h(CompletateTab,{key:'comp_'+selCentroAdmin,data,save,centroId}),
        tab==='tutte'&&h(TutteLavTab,{data,refresh}),
        tab==='report'&&h(ReportTab,{data,centroId:null}),
        tab==='centri'&&h(CentriTab,{data,save}),
        tab==='dip'&&h(DipendentiTab,{data,save}),
        tab==='tipi'&&h(TipiTab,{data,save}),
        tab==='utenti'&&h(UtentiTab,{data,save})
      )
    ),

    // Bottom Nav
    h('nav',{className:'bottom-nav'},
      BNAV.map(t=>h('button',{
        key:t.id,
        className:'bnav-btn'+(tab===t.id||(tab==='proposte'&&t.id==='proposte')||(tab==='richieste'&&t.id==='richieste')||(tab==='confermate'&&t.id==='confermate')?' active':''),
        onClick:()=>changeTab(t.id)
      },
        t.badge>0&&h('span',{className:'bnav-badge',style:t.urgent?{background:'#E24B4A'}:{}},t.badge>9?'9+':t.badge),
        h('span',{className:'bnav-icon'},t.icon),
        h('span',{className:'bnav-lbl'},t.label)
      ))
    )
  );
}

/* ── RICHIESTE ── */
function RichiesteTab({data,save,user,isAdmin,centroId}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const TIPI_RICH=[
    {id:'personale', label:'👷 Personale',    desc:'Richiesta di dipendenti'},
    {id:'attrezzatura',label:'🔧 Attrezzatura / Mezzi', desc:'Strumenti, mezzi o materiali'},
    {id:'altro',    label:'📦 Altro',          desc:'Altra necessità'},
  ];

  const [mostraChiuse,setMostraChiuse]=useState(false);
  const richieste=(data.richieste||[]).filter(r=>{
    if(!mostraChiuse&&r.stato==='chiusa')return false;
    if(isAdmin){if(centroId&&r.centroId!==centroId)return false;return true;}
    return(user.centroIds||[]).includes(r.centroId);
  }).sort((a,b)=>{
    if(a.urgente&&!b.urgente)return -1;if(!a.urgente&&b.urgente)return 1;
    return String(a.dataRichiesta||'').localeCompare(String(b.dataRichiesta||''));
  });

  const pendenti=richieste.filter(r=>r.stato==='pendente').length;

  const apriNuova=()=>{
    const cid=centroId||(user.centroIds||[])[0]||'';
    setForm({centroId:cid,tipoRichiesta:'personale',dataRichiesta:'',nDipendenti:'',descrizione:'',note:'',urgente:false});
    setModal('nuova');
  };
  const apriGestisci=r=>{setForm({...r,noteAdmin:r.noteAdmin||'',dipendentiIds:r.dipendentiIds||[]});setModal('gestisci');};
  const close=()=>{setModal(null);setForm({});};

  const inviaNuova=async()=>{
    if(!form.centroId||!form.descrizione?.trim()){alert('Compila almeno il tipo di lavoro/descrizione.');return;}
    if(form.tipoRichiesta==='personale'&&!form.nDipendenti){alert('Indica il numero di dipendenti richiesti.');return;}
    setSaving(true);
    const nuova={id:gid(),centroId:form.centroId,tipoRichiesta:form.tipoRichiesta||'personale',
      dataRichiesta:form.dataRichiesta||'',nDipendenti:parseInt(form.nDipendenti)||0,
      descrizione:form.descrizione,note:form.note||'',urgente:!!form.urgente,
      stato:'pendente',createdBy:user.id,createdAt:new Date().toISOString(),noteAdmin:'',dipendentiIds:[]};
    await save({...data,richieste:[...(data.richieste||[]),nuova]});
    const centro=(data.centri||[]).find(x=>x.id===form.centroId);
    const tipoLabel=TIPI_RICH.find(t=>t.id===form.tipoRichiesta)?.label||form.tipoRichiesta;
    const urgStr=form.urgente?'🚨 URGENTE — ':'';
    const msg=`🌿 <b>Sicilia Verde — ${urgStr}Nuova richiesta</b>\n\n`+
      `👤 <b>Responsabile:</b> ${user.nome}\n`+
      `📍 <b>Centro:</b> ${centro?.nome||'—'}\n`+
      `📋 <b>Tipo:</b> ${tipoLabel}\n`+
      `📝 <b>Descrizione:</b> ${form.descrizione}\n`+
      (form.tipoRichiesta==='personale'&&form.nDipendenti?`👷 <b>Dipendenti richiesti:</b> ${form.nDipendenti}\n`:'')+
      (form.dataRichiesta?`📅 <b>Data:</b> ${form.dataRichiesta}\n`:'')+
      (form.note?`💬 <b>Note:</b> ${form.note}\n`:'')+
      `\n🔗 <a href="https://app.vivaioapp.it/">Apri gestionale → Richieste</a>`;
    for(const cid of [].concat(TG_ADMIN_CHATID))await tgSend(cid, msg);
    setSaving(false);close();
  };

  const tog=id=>setForm(f=>{const inList=(f.dipendentiIds||[]).includes(id);return{...f,dipendentiIds:inList?(f.dipendentiIds||[]).filter(x=>x!==id):[...(f.dipendentiIds||[]),id]};});

  const rispondi=async(approva)=>{
    setSaving(true);
    const dipAssegnati=approva&&form.tipoRichiesta==='personale'?(form.dipendentiIds||[]):[];
    const updated={...form,stato:approva?'approvata':'rifiutata',noteAdmin:form.noteAdmin||'',dipendentiIds:dipAssegnati,rispostaAt:new Date().toISOString()};
    await save({...data,richieste:(data.richieste||[]).map(r=>r.id===form.id?updated:r)});
    const centro=(data.centri||[]).find(x=>x.id===form.centroId);
    const tipoLabel=TIPI_RICH.find(t=>t.id===form.tipoRichiesta)?.label||form.tipoRichiesta;
    const stato=approva?'✅ APPROVATA':'❌ RIFIUTATA';
    const nomi=approva&&dipAssegnati.length>0?dipAssegnati.map(id=>{const d=(data.dipendenti||[]).find(x=>x.id===id);return d?d.cognome:'?';}).join(', '):'';
    const msg=`🌿 <b>Sicilia Verde — Richiesta ${stato}</b>\n\n`+
      `📍 <b>Centro:</b> ${centro?.nome||'—'}\n`+
      `📋 <b>Tipo:</b> ${tipoLabel}\n`+
      `📝 <b>Descrizione:</b> ${form.descrizione}\n`+
      (approva&&nomi?`👷 <b>Dipendenti assegnati:</b> ${nomi}\n`:'')+
      (form.noteAdmin?`💬 <b>Risposta titolare:</b> ${form.noteAdmin}`:'');
    await notifyResponsabili(form.centroId, msg, data);
    setSaving(false);close();
  };

  const del=async id=>{if(!confirm('Eliminare?'))return;await save({...data,richieste:(data.richieste||[]).filter(r=>r.id!==id)});};

  const STATO={
    pendente:  {label:'In attesa', bg:'#FAC775',tx:'#633806'},
    approvata: {label:'Approvata', bg:'#C0DD97',tx:'#27500A'},
    rifiutata: {label:'Rifiutata', bg:'#F7C1C1',tx:'#A32D2D'},
    chiusa:    {label:'Chiusa',    bg:'#D3D1C7',tx:'#444441'}
  };
  const TIPO_ICON={personale:'👷',attrezzatura:'🔧',altro:'📦'};

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:'8px'}},
      h('div',null,
        h('h3',{style:{fontSize:'15px',fontWeight:500,marginBottom:'2px'}},'Richieste'),
        pendenti>0&&h('span',{style:{fontSize:'13px',color:'#A32D2D',fontWeight:500}},pendenti+' in attesa di risposta')
      ),
      h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
        h('label',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'#666',cursor:'pointer'}},
          h('input',{type:'checkbox',checked:mostraChiuse,onChange:e=>setMostraChiuse(e.target.checked),style:{width:'16px',height:'16px'}}),
          'Mostra chiuse'
        ),
        !isAdmin&&h('button',{onClick:apriNuova,className:'btn-g'},'+ Nuova richiesta')
      )
    ),

    richieste.length===0
      ?h('div',{className:'card'},h('p',{style:{fontSize:'14px',color:'#666'}},isAdmin?'Nessuna richiesta ricevuta.':'Nessuna richiesta inviata.'))
      :h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
        richieste.map(r=>{
          const centro=(data.centri||[]).find(x=>x.id===r.centroId);
          const s=STATO[r.stato]||STATO.pendente;
          const nomi=(r.dipendentiIds||[]).map(id=>{const d=(data.dipendenti||[]).find(x=>x.id===id);return d?d.cognome:'?';}).join(', ');
          const icon=TIPO_ICON[r.tipoRichiesta]||'📦';
          return h('div',{key:r.id,className:'card',style:{borderLeft:'4px solid '+(r.urgente?'#E24B4A':r.stato==='approvata'?'#639922':r.stato==='rifiutata'?'#F7C1C1':'#FAC775')}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px',flexWrap:'wrap',gap:'6px'}},
              h('div',{style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}},
                r.urgente&&h('span',{style:{fontSize:'12px',background:'#E24B4A',color:'#fff',borderRadius:'4px',padding:'2px 8px',fontWeight:600}},'🚨 URGENTE'),
                h('span',{style:{fontSize:'12px',background:'#f5f5f3',color:'#444',borderRadius:'4px',padding:'2px 8px'}},icon+' '+(TIPI_RICH.find(t=>t.id===r.tipoRichiesta)?.label.replace(/^[^\s]+\s/,'')||r.tipoRichiesta||'—')),
                h('span',{style:{fontSize:'12px',background:s.bg,color:s.tx,borderRadius:'4px',padding:'2px 8px',fontWeight:500}},s.label)
              ),
              h('div',{style:{display:'flex',gap:'6px'}},
                isAdmin&&r.stato==='pendente'&&h('button',{onClick:()=>apriGestisci(r),className:'btn-g sm'},'Rispondi'),
                r.stato!=='pendente'&&r.stato!=='chiusa'&&h('button',{onClick:async()=>{await save({...data,richieste:(data.richieste||[]).map(x=>x.id===r.id?{...x,stato:'chiusa'}:x)});},className:'btn-n sm'},'✓ Chiudi'),
                h('button',{onClick:()=>del(r.id),className:'btn-r sm'},'🗑')
              )
            ),
            h('p',{style:{fontSize:'14px',fontWeight:500,marginBottom:'6px'}},r.descrizione),
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'4px',fontSize:'13px',color:'#666'}},
              isAdmin&&h('span',null,'📍 ',centro?.nome||'—'),
              r.tipoRichiesta==='personale'&&r.nDipendenti>0&&h('span',null,'👷 ',r.nDipendenti,' dip. richiesti'),
              r.dataRichiesta&&h('span',null,'📅 ',r.dataRichiesta)
            ),
            r.note&&h('p',{style:{fontSize:'13px',color:'#888',marginTop:'6px'}},'💬 '+r.note),
            r.stato!=='pendente'&&r.noteAdmin&&h('p',{style:{fontSize:'13px',color:'#3B6D11',marginTop:'6px'}},'✅ Titolare: '+r.noteAdmin),
            r.stato==='approvata'&&nomi&&h('p',{style:{fontSize:'13px',color:'#27500A',marginTop:'4px',fontWeight:500}},'👷 Assegnati: '+nomi)
          );
        })
      ),

    /* ── MODAL NUOVA RICHIESTA ── */
    modal==='nuova'&&h(Modal,{title:'Nuova richiesta',onClose:close},
      !centroId&&h('div',{style:{marginBottom:'12px'}},
        h('label',{className:'lbl'},'Centro *'),
        h('select',{value:form.centroId||'',onChange:F('centroId')},
          h('option',{value:''},'— Seleziona —'),
          (user.centroIds||[]).map(id=>{const cc=(data.centri||[]).find(x=>x.id===id);return cc?h('option',{key:id,value:id},cc.nome):null;})
        )
      ),

      h('label',{className:'lbl'},'Tipo di richiesta *'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'14px'}},
        TIPI_RICH.map(t=>h('label',{key:t.id,style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',cursor:'pointer',padding:'10px 6px',borderRadius:'10px',border:'1px solid '+(form.tipoRichiesta===t.id?'#3B6D11':'#e5e5e5'),background:form.tipoRichiesta===t.id?'#EAF3DE':'#fff',textAlign:'center'}},
          h('input',{type:'radio',name:'tipoRich',value:t.id,checked:form.tipoRichiesta===t.id,onChange:F('tipoRichiesta'),style:{display:'none'}}),
          h('span',{style:{fontSize:'22px'}},t.label.split(' ')[0]),
          h('span',{style:{fontSize:'12px',fontWeight:form.tipoRichiesta===t.id?600:400,color:form.tipoRichiesta===t.id?'#3B6D11':'#666'}},t.label.replace(/^[^\s]+\s/,''))
        ))
      ),

      h('label',{className:'lbl'},form.tipoRichiesta==='personale'?'Tipo di lavoro *':form.tipoRichiesta==='attrezzatura'?'Cosa ti serve *':'Descrizione *'),
      h('input',{value:form.descrizione||'',onChange:F('descrizione'),placeholder:
        form.tipoRichiesta==='personale'?'Es. Irrigazione settore S3, Potatura...':
        form.tipoRichiesta==='attrezzatura'?'Es. Trattore, pompa irroratrice, vasi 14cm...':
        'Descrivi la necessità...',
        style:{marginBottom:'12px'}}),

      form.tipoRichiesta==='personale'&&h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}},
        h('div',null,h('label',{className:'lbl'},'N. dipendenti richiesti *'),h('input',{type:'number',min:'1',value:form.nDipendenti||'',onChange:F('nDipendenti'),placeholder:'Es. 3'})),
        h('div',null,h('label',{className:'lbl'},'Data'),h('input',{type:'date',value:form.dataRichiesta||'',onChange:F('dataRichiesta')}))
      ),

      form.tipoRichiesta!=='personale'&&h('div',{style:{marginBottom:'12px'}},
        h('label',{className:'lbl'},'Data in cui serve'),
        h('input',{type:'date',value:form.dataRichiesta||'',onChange:F('dataRichiesta')})
      ),

      h('label',{className:'lbl'},'Note aggiuntive'),
      h('textarea',{value:form.note||'',onChange:F('note'),rows:2,style:{marginBottom:'12px'},placeholder:'Ulteriori dettagli, urgenza...'}),

      h('label',{style:{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',fontSize:'14px',marginBottom:'1.25rem',padding:'10px',background:'#FFF5F5',borderRadius:'8px',border:'1px solid #F7C1C1'}},
        h('input',{type:'checkbox',checked:!!form.urgente,onChange:e=>setForm(f=>({...f,urgente:e.target.checked})),style:{width:'18px',height:'18px',accentColor:'#E24B4A'}}),
        h('span',null,'🚨 Segnala come ',h('b',null,'URGENTE'))
      ),
      h('button',{onClick:inviaNuova,className:'btn-g',style:{width:'100%'},disabled:saving},saving?'Invio...':'Invia richiesta')
    ),

    /* ── MODAL GESTISCI (admin) ── */
    modal==='gestisci'&&h(Modal,{title:'Rispondi alla richiesta',onClose:close},
      h('div',{style:{background:'#f5f5f3',borderRadius:'8px',padding:'12px',marginBottom:'14px',fontSize:'13px'}},
        h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'6px'}},
          h('span',{style:{fontSize:'16px'}},TIPO_ICON[form.tipoRichiesta]||'📦'),
          h('span',{style:{fontWeight:600,fontSize:'14px'}},form.descrizione)
        ),
        h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',color:'#666'}},
          h('span',null,'📍 ',((data.centri||[]).find(x=>x.id===form.centroId)?.nome)||'—'),
          form.tipoRichiesta==='personale'&&form.nDipendenti>0&&h('span',null,'👷 ',form.nDipendenti,' richiesti'),
          form.dataRichiesta&&h('span',null,'📅 ',form.dataRichiesta),
          form.urgente&&h('span',{style:{color:'#E24B4A',fontWeight:600}},'🚨 URGENTE')
        ),
        form.note&&h('p',{style:{marginTop:'6px',color:'#666'}},'💬 '+form.note)
      ),

      form.tipoRichiesta==='personale'&&h('div',null,
        h('label',{className:'lbl'},'Assegna dipendenti'),
        h('div',{style:{border:'1px solid #ccc',borderRadius:'8px',padding:'8px',maxHeight:'180px',overflowY:'auto',marginBottom:'10px'}},
          [...(data.dipendenti||[])].sort((a,b)=>(a.cognome||'').localeCompare(b.cognome||'')).map(d=>
            h('label',{key:d.id,style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 4px',cursor:'pointer',fontSize:'14px',borderBottom:'1px solid #f5f5f3'}},
              h('input',{type:'checkbox',checked:(form.dipendentiIds||[]).includes(d.id),onChange:()=>tog(d.id)}),
              d.cognome+' '+(d.nome||'')
            )
          )
        ),
        (form.dipendentiIds||[]).length>0&&h('p',{style:{fontSize:'12px',color:'#3B6D11',marginBottom:'10px'}},'✓ '+(form.dipendentiIds||[]).length+' selezionati')
      ),

      h('label',{className:'lbl'},'Risposta / nota per il responsabile'),
      h('textarea',{value:form.noteAdmin||'',onChange:F('noteAdmin'),rows:3,style:{marginBottom:'1.25rem'},placeholder:
        form.tipoRichiesta==='personale'?'Es. Ho assegnato Mario e Luigi, arriveranno alle 7:00...':
        form.tipoRichiesta==='attrezzatura'?'Es. Il trattore sarà disponibile domani mattina...':
        'La tua risposta...'}),

      h('div',{style:{display:'flex',gap:'10px'}},
        h('button',{onClick:()=>rispondi(true),className:'btn-g',style:{flex:1},disabled:saving},saving?'...':'✅ Approva'),
        h('button',{onClick:()=>rispondi(false),style:{flex:1,border:'1px solid #F7C1C1',background:'#fff',borderRadius:'8px',padding:'10px',fontSize:'14px',cursor:'pointer',color:'#A32D2D'},disabled:saving},saving?'...':'❌ Rifiuta')
      )
    )
  );
}

/* ── RESP SETTORI TAB ── */
function RespSettoriTab({data,save,centroId}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const centro=(data.centri||[]).find(c=>c.id===centroId);
  const setts=(data.settori||[]).filter(s=>s.centroId===centroId);

  const openSettore=(item={})=>{setForm({...item,varieta:item.varieta||[]});setModal('settore');};
  const close=()=>{setModal(null);setForm({});};

  const savSettore=async()=>{
    if(!form.nome?.trim())return;
    setSaving(true);
    const varieta=(form.varieta||[]).filter(v=>v.nome?.trim()).map(v=>({nome:v.nome,quantita:parseInt(v.quantita)||0,vaso:v.vaso||'',fornitore:v.fornitore||'',dataEntrata:v.dataEntrata||''}));
    const totPiante=varieta.reduce((s,v)=>s+(parseInt(v.quantita)||0),0);
    const sClean={...form,varieta,capacita:totPiante||parseInt(form.capacita)||0,
      lunghezza:form.lunghezza?parseFloat(form.lunghezza):null,
      larghezza:form.larghezza?parseFloat(form.larghezza):null,
      fornitore:form.fornitore||'',dataEntrata:form.dataEntrata||null,note:form.note||''};
    const newSettori=form.id?data.settori.map(x=>x.id===form.id?sClean:x):[...data.settori,{id:gid(),centroId,...sClean}];
    await save({...data,settori:newSettori});
    setSaving(false);close();
  };

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
      h('h3',{style:{fontSize:'15px',fontWeight:500}},centro?.nome||'',' — ',setts.length,' settori'),
      h('button',{onClick:()=>openSettore(),className:'btn-g sm'},'+ Aggiungi')
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
      setts.length===0?h('div',{className:'card',style:{textAlign:'center',padding:'2rem'}},
        h('p',{style:{color:'#666',fontSize:'14px'}},'Nessun settore.')
      ):
      setts.map(s=>h('div',{key:s.id,className:'card',style:{cursor:'pointer'},onClick:()=>openSettore(s)},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}},
          h('div',null,
            h('div',{style:{fontWeight:600,fontSize:'15px'}},s.nome),
            s.capacita>0&&h('div',{style:{fontSize:'13px',color:'#3B6D11',marginTop:'2px'}},'🌱 '+s.capacita.toLocaleString('it-IT')+' piante')
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
            s.lunghezza&&s.larghezza&&h('span',{style:{fontSize:'12px',color:'#888'}},s.lunghezza+'×'+s.larghezza+' m'),
            h('span',{style:{fontSize:'20px',color:'#ccc'}},'›')
          )
        ),
        s.varieta&&s.varieta.length>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'6px'}},
          s.varieta.filter(v=>v.nome).map((v,i)=>h('span',{key:i,style:{fontSize:'11px',background:'#EAF3DE',color:'#27500A',borderRadius:'4px',padding:'2px 8px'}},
            v.nome+(v.vaso?' v.'+v.vaso:'')+(v.quantita?' ('+v.quantita.toLocaleString('it-IT')+')':'')
          ))
        ),
        s.note&&h('p',{style:{fontSize:'12px',color:'#888',marginTop:'6px'}},s.note)
      ))
    ),
    modal==='settore'&&h(Modal,{title:form.id?'Modifica settore':'Nuovo settore',onClose:close},
      h('label',{className:'lbl'},'Nome settore *'),
      h('input',{value:form.nome||'',onChange:F('nome'),style:{marginBottom:'14px'}}),

      h('label',{className:'lbl'},'Varietà di piante'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'8px'}},
        (form.varieta||[]).map((v,i)=>h('div',{key:i,style:{background:'#f9f9f7',borderRadius:'10px',padding:'10px',border:'1px solid #e5e5e5',position:'relative'}},
          h('button',{onClick:()=>setForm(f=>({...f,varieta:(f.varieta||[]).filter((_,j)=>j!==i)})),
            style:{position:'absolute',top:'8px',right:'8px',background:'transparent',border:'none',color:'#A32D2D',cursor:'pointer',fontSize:'18px',lineHeight:1,padding:0}},'×'),
          h('label',{className:'lbl'},'Varietà / tipologia'),
          h('input',{value:v.nome||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],nome:e.target.value};setForm(f=>({...f,varieta:vs}));},
            placeholder:'Es. Rosa Rossa, Basilico...',style:{marginBottom:'8px'}}),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}},
            h('div',null,h('label',{className:'lbl'},'Quantità'),h('input',{type:'number',value:v.quantita||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],quantita:parseInt(e.target.value)||0};setForm(f=>({...f,varieta:vs}));},placeholder:'0'})),
            h('div',null,h('label',{className:'lbl'},'Vaso'),h('input',{value:v.vaso||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],vaso:e.target.value};setForm(f=>({...f,varieta:vs}));},placeholder:'Es. 14cm'}))
          ),
          h('label',{className:'lbl'},'Fornitore'),
          h('input',{value:v.fornitore||'',onChange:e=>{const vs=[...(form.varieta||[])];vs[i]={...vs[i],fornitore:e.target.value};setForm(f=>({...f,varieta:vs}));},
            placeholder:'Nome fornitore',style:{marginBottom:'8px'}}),
          h('label',{className:'lbl'},'Data entrata'),

/* ── RESPONSABILE APP ── */
function RespApp({data,save,user,logout}){
  const ids=user.centroIds||[];
  const [selId,setSelId]=useState(ids.length===1?ids[0]:null);
  const [tab,setTab]=useState('confermate');
  const [ok,setOk]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [showRich,setShowRich]=useState(false);
  const centro=(data.centri||[]).find(c=>c.id===selId);

  const nConfermate=(data.lavorazioni||[]).filter(l=>l.centroId===selId&&l.stato==='confermata').length;
  const nRichiestePendenti=(data.richieste||[]).filter(r=>(user.centroIds||[]).includes(r.centroId)&&r.stato==='pendente').length;
  const nProposte=(data.lavorazioni||[]).filter(l=>l.centroId===selId&&l.stato==='proposta').length;

  if(!ids.length)return h('div',null,
    h(TopBar,{title:'Responsabile',user,logout}),
    h('div',{style:{padding:'1.5rem'}},h('div',{className:'card'},h('p',{style:{color:'#666'}},"Nessun centro assegnato. Contatta l'amministratore.")))
  );

  // Centro selection
  if(!selId)return h('div',{style:{minHeight:'100vh',background:'#f3f4f2'}},
    h(TopBar,{title:'Seleziona centro',user,logout}),
    h('div',{style:{padding:'1.25rem',maxWidth:'480px',margin:'0 auto'}},
      h('p',{style:{fontSize:'14px',color:'#666',marginBottom:'1rem'}},'Su quale centro vuoi lavorare?'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
        ids.map(id=>{
          const cc=(data.centri||[]).find(x=>x.id===id);if(!cc)return null;
          const proposte=(data.lavorazioni||[]).filter(l=>l.centroId===id&&l.stato==='proposta').length;
          const conf=(data.lavorazioni||[]).filter(l=>l.centroId===id&&l.stato==='confermata').length;
          const richP=(data.richieste||[]).filter(r=>r.centroId===id&&r.stato==='pendente').length;
          return h('button',{key:id,onClick:()=>setSelId(id),className:'card',style:{textAlign:'left',border:'none',cursor:'pointer',padding:'1rem',display:'flex',justifyContent:'space-between',alignItems:'center',WebkitTapHighlightColor:'transparent'}},
            h('div',null,
              h('div',{style:{fontWeight:600,fontSize:'16px',marginBottom:'4px'}},cc.nome),
              h('div',{style:{display:'flex',gap:'10px',fontSize:'13px',color:'#888'}},
                conf>0&&h('span',{style:{color:'#3B6D11',fontWeight:500}},'✓ '+conf+' confermate'),
                proposte>0&&h('span',null,proposte+' proposte'),
                richP>0&&h('span',{style:{color:'#E24B4A',fontWeight:500}},'⚠ '+richP+' richieste')
              )
            ),
            h('span',{style:{fontSize:'20px',color:'#ccc'}},'›')
          );
        })
      )
    )
  );

  // Main app with bottom nav
  const TABS=[
    {id:'confermate', icon:'✅', label:'Confermate', badge:nConfermate},
    {id:'proposte',   icon:'📋', label:'Proposte',   badge:nProposte},
    {id:'richieste',  icon:'📬', label:'Richieste',  badge:nRichiestePendenti},
    {id:'altro',      icon:'⋯',  label:'Altro',      badge:0},
  ];

  const changeTab=t=>{setTab(t);setOk('');setShowForm(false);setShowRich(false);};

  return h('div',{style:{minHeight:'100vh',background:'#f3f4f2',paddingBottom:'0'}},
    // TopBar compatto
    h('div',{className:'topbar'},
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px',flex:1,minWidth:0}},
        ids.length>1&&h('button',{onClick:()=>{setSelId(null);setTab('confermate');},style:{background:'transparent',border:'none',fontSize:'20px',cursor:'pointer',padding:'4px',color:'#3B6D11'}},'‹'),
        h('div',{style:{minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:'14px',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},centro?.nome||''),
          h('div',{style:{fontSize:'11px',color:'#888'}},user.nome)
        )
      ),
      h('button',{onClick:logout,className:'btn-n',style:{padding:'5px 10px',fontSize:'13px'}},'Esci')
    ),

    // Contenuto principale
    h('div',{className:'content-with-nav',style:{padding:'1rem'}},
      // Success box
      ok&&h('div',{className:'success-box',style:{marginBottom:'1rem'}},
        h('span',null,ok),
        h('button',{onClick:()=>setOk(''),className:'btn-n sm'},'×')
      ),

      // TAB: CONFERMATE
      tab==='confermate'&&h('div',null,
        nConfermate===0
          ?h('div',{className:'card',style:{textAlign:'center',padding:'2rem'}},
              h('div',{style:{fontSize:'40px',marginBottom:'8px'}},'✅'),
              h('p',{style:{color:'#666',fontSize:'14px'}},'Nessuna lavorazione confermata.')
            )
          :h(ConfermatTab,{data,save,centroId:selId,readOnly:true})
      ),

      // TAB: PROPOSTE
      tab==='proposte'&&h('div',null,
        showForm
          ?h('div',null,
              h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'1rem'}},
                h('button',{onClick:()=>setShowForm(false),style:{background:'transparent',border:'none',fontSize:'24px',cursor:'pointer',color:'#3B6D11'}},'‹'),
                h('h3',{style:{fontSize:'15px',fontWeight:500}},'Nuova proposta')
              ),
              h(LavForm,{data,save,centroId:selId,onDone:()=>{setShowForm(false);setOk('✓ Proposta salvata! L\'admin la esaminerà presto.');},adminMode:false})
            )
          :h('div',null,
              nProposte===0
                ?h('div',{className:'card',style:{textAlign:'center',padding:'2rem'}},
                    h('div',{style:{fontSize:'40px',marginBottom:'8px'}},'📋'),
                    h('p',{style:{color:'#666',fontSize:'14px',marginBottom:'1rem'}},'Nessuna proposta inserita.')
                  )
                :h('div',{style:{marginBottom:'1rem'}},
                    // Mini lista proposte pendenti
                    h('p',{style:{fontSize:'13px',color:'#666',marginBottom:'8px'}},nProposte+' proposte in attesa di conferma'),
                    (data.lavorazioni||[]).filter(l=>l.centroId===selId&&l.stato==='proposta').sort((a,b)=>{
                      const P={alta:0,media:1,bassa:2,'':3};
                      return (P[a.priorita||'']??3)-(P[b.priorita||'']??3);
                    }).map(l=>{
                      const s=(data.settori||[]).find(x=>x.id===l.settoreId);
                      const t=(data.tipi||[]).find(x=>x.id===l.tipoId);
                      const PCOL={alta:'#E24B4A',media:'#EF9F27',bassa:'#639922','':'#ccc'};
                      return h('div',{key:l.id,className:'card',style:{marginBottom:'8px',borderLeft:'4px solid '+(PCOL[l.priorita||'']||'#ddd')}},
                        h('div',{style:{fontWeight:500,fontSize:'14px'}},t?.nome||'Lavorazione generica'),
                        h('div',{style:{fontSize:'13px',color:'#888',marginTop:'3px'}},
                          (s?.nome?s.nome+' · ':'')+(l.data?'📅 '+l.data:'Nessuna data'),
                          l.note&&h('span',null,' · '+l.note)
                        )
                      );
                    })
                  )
            )
      ),

      // TAB: RICHIESTE
      tab==='richieste'&&h(RichiesteTab,{data,save,user,isAdmin:false,centroId:selId}),

      // TAB: ALTRO (settori, completate, report)
      tab==='altro'&&h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
        [{id:'settori',icon:'🌱',label:'Settori del centro'},
         {id:'completate',icon:'📂',label:'Lavorazioni completate'},
         {id:'report',icon:'📊',label:'Report e statistiche'}
        ].map(item=>h('button',{key:item.id,onClick:()=>changeTab(item.id),className:'card',
          style:{display:'flex',alignItems:'center',gap:'14px',border:'none',cursor:'pointer',textAlign:'left',WebkitTapHighlightColor:'transparent'}},
          h('span',{style:{fontSize:'28px'}}),item.icon,
          h('span',{style:{fontSize:'15px',fontWeight:500}},item.label),
          h('span',{style:{marginLeft:'auto',fontSize:'20px',color:'#ccc'}},'›')
        ))
      ),

      // TAB: SETTORI, COMPLETATE, REPORT (con back)
      ['settori','completate','report'].includes(tab)&&h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'1rem'}},
          h('button',{onClick:()=>changeTab('altro'),style:{background:'transparent',border:'none',fontSize:'24px',cursor:'pointer',color:'#3B6D11'}},'‹'),
          h('h3',{style:{fontSize:'15px',fontWeight:500}},tab==='settori'?'Settori':tab==='completate'?'Completate':'Report')
        ),
        tab==='settori'&&h(RespSettoriTab,{data,save,centroId:selId}),
        tab==='completate'&&h(CompletateTab,{data,save,centroId:selId}),
        tab==='report'&&h(ReportTab,{data,centroId:selId})
      )
    ),

    // FAB sempre visibile (azione contestuale per tab)
    ['confermate','proposte','richieste'].includes(tab)&&!['settori','completate','report'].includes(tab)&&h('button',{
      onClick:()=>{
        if(tab==='richieste')setShowRich(true);
        else{setTab('proposte');setShowForm(true);}
      },
      className:'fab',
      title:'Nuova proposta'
    },'+'),

    // Bottom Navigation Bar
    h('nav',{className:'bottom-nav'},
      TABS.map(t=>h('button',{
        key:t.id,
        className:'bnav-btn'+(tab===t.id?' active':''),
        onClick:()=>changeTab(t.id)
      },
        t.badge>0&&h('span',{className:'bnav-badge'},t.badge>9?'9+':t.badge),
        h('span',{className:'bnav-icon'},t.icon),
        h('span',{className:'bnav-lbl'},t.label)
      ))
    )
  );
}

function App(){
  const [loading,setLoading]=useState(true);
  const [dbErr,setDbErr]=useState(null);
  const [data,setData]=useState(null);
  const ref=useRef(null);
  const [user,setUser]=useState(()=>{
    try{const u=sessionStorage.getItem('va_user');return u?JSON.parse(u):null;}catch{return null;}
  });

  useEffect(()=>{
    const _tid=user?.tenant?.id||'';Promise.all([sbGet('centri',_tid),sbGet('settori',_tid),sbGet('dipendenti',_tid),sbGet('tipi',_tid),sbGet('utenti',_tid),sbGet('lavorazioni',_tid),sbGet('richieste',_tid)]).then(([centri,settori,dipendenti,tipi,utenti,lavorazioni,richieste])=>{
        const normSett=settori.map(s=>({...s,varieta:(s.varieta||[]).map(v=>({nome:v.nome||'',quantita:v.quantita||0,vaso:v.vaso||'',fornitore:v.fornitore||'',dataEntrata:v.dataEntrata||''})),note:s.note||'',lunghezza:s.lunghezza||null,larghezza:s.larghezza||null}));
        settori=normSett;
        const normLav=lavorazioni.map(l=>({...l,dipendentiIds:l.dipendentiIds||[],oreMap:l.oreMap||{},data:l.data||'',priorita:l.priorita||'',stato:l.stato||'proposta',varietaId:l.varietaId||''}));
        const d={centri,settori,dipendenti,tipi,utenti,lavorazioni:normLav,richieste:richieste||[]};
        setData(d);ref.current=d;setLoading(false);
      })
      .catch(()=>{setDbErr(true);setLoading(false);});
  },[]);

  // Auto-refresh lavorazioni ogni 60s quando l'admin è loggato
  // Auto-refresh for all users every 30s
  const lastReminderRef=useRef(0);
  useEffect(()=>{
    if(!user)return;
    const t=setInterval(()=>{
      const _rt2=user?.tenant?.id||'';Promise.all([sbGet('lavorazioni',_rt2),sbGet('richieste',_rt2)]).then(([lavorazioni,richieste])=>{
        const normLav=lavorazioni.map(l=>({...l,dipendentiIds:l.dipendentiIds||[],oreMap:l.oreMap||{},data:l.data||'',priorita:l.priorita||'',stato:l.stato||'proposta',varietaId:l.varietaId||''}));
        const nd={...ref.current,lavorazioni:normLav,richieste:richieste||[]};
        setData(nd);ref.current=nd;

        // Reminder urgenti ogni 30 minuti (solo admin)
        if(user.ruolo==='admin'){
          const now=Date.now();
          if(now-lastReminderRef.current>=30*60*1000){
            const urgenti=(richieste||[]).filter(r=>r.stato==='pendente'&&r.urgente);
            if(urgenti.length>0){
              lastReminderRef.current=now;
              const lines=urgenti.map(r=>{
                const centro=(nd.centri||[]).find(x=>x.id===r.centroId);
                return '🚨 '+(centro?.nome||'—')+' — '+r.descrizione;
              }).join('\n');
              tgSend((data.utenti||[]).filter(u=>u.ruolo==='admin'&&u.tgChatId)[0]?.tgChatId||null,
                `⏰ <b>Reminder Sicilia Verde</b>

Hai ${urgenti.length} richiesta${urgenti.length>1?'e':''} urgente${urgenti.length>1?'':''} in attesa di risposta:

${lines}

🔗 <a href="https://app.vivaioapp.it/">Apri gestionale → Richieste</a>`
              );
            }
          }
        }
      }).catch(()=>{});
    },30000);
    return()=>clearInterval(t);
  },[user]);

  useEffect(()=>{
    if(!user||user.ruolo!=='admin')return;
    const t=setInterval(()=>{
      const _rt2=user?.tenant?.id||'';Promise.all([sbGet('lavorazioni',_rt2),sbGet('richieste',_rt2)]).then(([lavorazioni,richieste])=>{
        const normLav=lavorazioni.map(l=>({...l,dipendentiIds:l.dipendentiIds||[],oreMap:l.oreMap||{},data:l.data||'',priorita:l.priorita||'',stato:l.stato||'proposta',varietaId:l.varietaId||''}));
        const nd={...ref.current,lavorazioni:normLav,richieste:richieste||[]};
        setData(nd);ref.current=nd;
      }).catch(()=>{});
    },30000);
    return()=>clearInterval(t);
  },[user]);

  function sanitize(tbl,item){
    if(tbl==='lavorazioni')return{...item,
      data:item.data||null,
      ore:item.ore!=null&&item.ore!==''?parseFloat(item.ore):null,
      dipendentiIds:item.dipendentiIds||[],
      oreMap:item.oreMap||{},
      priorita:item.priorita||'',
      stato:item.stato||'proposta',
      varietaId:item.varietaId||''
    };
    if(tbl==='richieste')return{...item,
      dataRichiesta:item.dataRichiesta||null,
      nDipendenti:parseInt(item.nDipendenti)||0,
      dipendentiIds:item.dipendentiIds||[],

      stato:item.stato||'pendente',

      note:item.note||'',
      noteAdmin:item.noteAdmin||'',
      createdBy:item.createdBy||'',
      rispostaAt:item.rispostaAt||null
    };
    return item;

  async function save(newData){
    const tables=['centri','settori','dipendenti','tipi','utenti','lavorazioni','richieste'];
    for(const tbl of tables){
      const oldMap=new Map((ref.current[tbl]||[]).map(x=>[x.id,x]));
      const newMap=new Map((newData[tbl]||[]).map(x=>[x.id,x]));
      for(const[id]of oldMap)if(!newMap.has(id))await sbDel(tbl,id);
      for(const[id,item]of newMap){
        const clean=sanitize(tbl,item);
        if(!oldMap.has(id)){const _ti={...clean,tenantId:user?.tenant?.id||''};const r=await sbIns(tbl,_ti);if(!r||r.error)console.error('Insert error',tbl,r);}
        else if(JSON.stringify(sanitize(tbl,oldMap.get(id)))!==JSON.stringify(clean))await sbUpd(tbl,id,clean);
      }
    }
    setData(newData);ref.current=newData;
  }
